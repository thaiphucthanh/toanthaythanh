<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học của tôi - Toán Thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .dropdown-user {
            position: absolute; top: 120%; right: 0; width: 220px;
            background: white; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; flex-direction: column; padding: 10px 0;
            z-index: 100; border: 1px solid #f0f0f0;
        }
        .dropdown-user.active { display: flex; }
        .item-dropdown {
            padding: 12px 20px; font-size: 14px; font-weight: 600;
            color: #374151; transition: all 0.2s; display: flex; align-items: center;
        }
        .item-dropdown:hover { background: #f3f4f6; color: #1e40af; }
        .divider { height: 1px; background: #eee; margin: 5px 0; }
        
        .thanh-menu-ngang { background: #1e3a8a; color: white; }
        .khung-trang { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .danh-sach-menu { display: flex; gap: 20px; list-style: none; padding: 10px 0; }
        .item-menu { font-weight: bold; font-size: 15px; }
        .cum-logo { display: flex; align-items: center; gap: 10px; }
        .anh-dai-dien-logo { width: 50px; height: 50px; border-radius: 50%; }
        .ten-thuong-hieu-to { font-size: 20px; font-weight: 900; color: #1e3a8a; line-height: 1; }
        .ten-thuong-hieu-nho { font-size: 14px; color: #6b7280; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white shadow-md sticky top-0 z-[1000]">
        <div class="khung-trang flex items-center justify-between py-4">
            <a href="trangchu.html" class="cum-logo">
                <img src="logo.png" class="anh-dai-dien-logo border border-blue-100">
                <div>
                    <div class="ten-thuong-hieu-to tracking-tighter uppercase italic">Toán</div>
                    <div class="ten-thuong-hieu-nho uppercase tracking-widest text-[10px]">Thầy Thành</div>
                </div>
            </a>

            <div class="vung-tim-kiem hidden md:block flex-1 max-w-md mx-10">
                <input type="text" id="search-course" placeholder="Tìm khóa học của bạn..." class="w-full bg-gray-100 border-none p-2 px-4 rounded-full text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="cum-tai-khoan relative" id="user-section">
                <button class="px-5 py-2 text-blue-900 font-bold text-sm" onclick="location.href='login.html'">Đăng nhập</button>
            </div>
        </div>

        <nav class="thanh-menu-ngang">
            <div class="khung-trang">
                <ul class="danh-sach-menu">
                    <li><a href="trangchu.html" class="item-menu opacity-80 hover:opacity-100">Trang chủ</a></li>
                    <li><a href="khoa-hoc-cua-toi.html" class="item-menu opacity-100 border-b-2 border-yellow-400 pb-1">Khóa học của tôi</a></li>
                    <li><a href="#" class="item-menu opacity-80 hover:opacity-100">Tài liệu miễn phí</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="khung-trang py-12">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-black text-blue-900 border-l-8 border-yellow-400 pl-4 uppercase tracking-tight">Khóa học của tôi</h2>
                <p id="welcome-message" class="text-gray-500 font-medium mt-2 ml-4 italic">Đang tải dữ liệu học tập...</p>
            </div>
        </div>

        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-circle-notch animate-spin text-4xl text-blue-900"></i>
                <p class="text-gray-400 mt-4 font-bold uppercase text-xs tracking-widest">Đang kết nối dữ liệu Toán Thầy Thành...</p>
            </div>
        </div>
    </main>

    <script id="user-logged-template" type="text/template">
        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleUserMenu(event)">
            <div class="text-right hidden md:block">
                <div class="text-blue-900 font-black text-sm uppercase leading-tight">{fullname}</div>
                <div class="text-gray-400 text-[10px] font-bold uppercase tracking-widest italic">{role_text}</div>
            </div>
            <img src="logo.png" class="w-10 h-10 rounded-full border-2 border-blue-900 object-cover shadow-sm">
            
            <div class="dropdown-user shadow-2xl" id="dropdownUser">
                {admin_option}
                <a href="thong-tin-ca-nhan.html" class="item-dropdown"><i class="fas fa-user-circle mr-3 text-blue-500"></i> Thông tin cá nhân</a>
                <a href="khoa-hoc-cua-toi.html" class="item-dropdown text-blue-700 bg-blue-50"><i class="fas fa-book-open mr-3"></i> Khóa học của tôi</a>
                <div class="divider"></div>
                <a href="javascript:void(0)" onclick="logout()" class="item-dropdown text-red-600"><i class="fas fa-sign-out-alt mr-3"></i> Đăng xuất</a>
            </div>
        </div>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let userLocal = null;

        function checkLogin() {
            const data = localStorage.getItem('user');
            if (!data) {
                window.location.href = 'login.html';
                return null;
            }
            userLocal = JSON.parse(data);
            
            const userSection = document.getElementById('user-section');
            document.getElementById('welcome-message').innerText = `Chào mừng ${userLocal.fullname} quay trở lại học tập!`;
            
            let template = document.getElementById('user-logged-template').innerHTML;
            let adminOption = userLocal.role === 'admin' ? `
                <a href="admin.html" class="item-dropdown text-blue-700 bg-blue-50 font-bold italic">
                    <i class="fas fa-user-shield mr-3"></i> TRANG QUẢN TRỊ
                </a>
                <div class="divider"></div>` : '';
            
            template = template.replace('{fullname}', userLocal.fullname)
                               .replace('{role_text}', userLocal.role === 'admin' ? 'Thầy Thành' : 'Học sinh')
                               .replace('{admin_option}', adminOption);
            userSection.innerHTML = template;
            return userLocal;
        }

        async function loadMyCourses() {
            const courseContainer = document.getElementById('course-grid');
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const userId = user?.id?.toString().trim(); // Xử lý định dạng ID uuid

                if (!userId) {
                    courseContainer.innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">LỖI: KHÔNG XÁC ĐỊNH ĐƯỢC NGƯỜI DÙNG.</p>`;
                    return;
                }

                // 1. Lấy danh sách ID khóa học học sinh đã đăng ký
                const { data: enrolls, error: err1 } = await supabaseClient
                    .from('course_enrollments')
                    .select('course_id')
                    .eq('user_id', userId);

                if (err1) throw err1;

                if (!enrolls || enrolls.length === 0) {
                    courseContainer.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-white rounded-[40px] border-2 border-dashed">
                            <i class="fas fa-book-reader text-5xl text-gray-200 mb-4"></i>
                            <div class="text-gray-400 font-bold italic uppercase tracking-widest px-10">
                                Em chưa được cấp quyền khóa học nào.<br>
                                <span class="text-blue-900 not-italic text-sm">Hãy liên hệ Thầy Thành để được vào lớp nhé!</span>
                            </div>
                        </div>`;
                    return;
                }

                const listIds = enrolls.map(item => item.course_id);

                // 2. Truy vấn thông tin chi tiết khóa học, dùng đúng cột thumbnail_url
                const { data: courses, error: err2 } = await supabaseClient
                    .from('courses')
                    .select('id, course_name, description, thumbnail_url')
                    .in('id', listIds);

                if (err2) throw err2;

                // 3. Hiển thị danh sách khóa học lên màn hình
                courseContainer.innerHTML = courses.map(course => `
                    <div class="bg-white rounded-[40px] overflow-hidden shadow-sm border border-gray-100 hover:shadow-xl transition-all group">
                        <div class="aspect-video overflow-hidden bg-gray-100">
                            <img src="${course.thumbnail_url || 'logo.png'}" 
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" 
                                 onerror="this.src='logo.png'">
                        </div>
                        <div class="p-8">
                            <div class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-2 italic">Toán Thầy Thành</div>
                            <h3 class="text-xl font-black text-blue-900 mb-3 uppercase tracking-tighter line-clamp-1">${course.course_name}</h3>
                            <p class="text-gray-500 text-xs line-clamp-2 mb-6 font-medium">${course.description || 'Học Toán cùng Thầy Thành để bứt phá điểm số.'}</p>
                            
                            <a href="lesson-detail.html?id=${course.id}" class="inline-flex items-center justify-center w-full py-4 bg-blue-900 text-white rounded-2xl font-bold uppercase text-[11px] tracking-widest hover:bg-blue-800 transition-colors shadow-lg">
                                Vào học ngay <i class="fas fa-arrow-right ml-2 text-[9px]"></i>
                            </a>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Lỗi chi tiết:", err);
                courseContainer.innerHTML = `<div class="col-span-full text-center p-10 bg-red-50 rounded-3xl">
                    <p class="text-red-500 font-bold uppercase">Lỗi kết nối dữ liệu!</p>
                    <p class="text-gray-500 text-xs mt-2">${err.message}</p>
                    <p class="text-blue-800 text-[10px] mt-4 font-bold">Thầy hãy kiểm tra xem đã bật Policy (RLS) cho bảng chưa nhé!</p>
                </div>`;
            }
        }

        function toggleUserMenu(event) {
            event.stopPropagation();
            document.getElementById('dropdownUser')?.classList.toggle('active');
        }

        function logout() {
            if(confirm("Thầy muốn đăng xuất hệ thống?")) {
                localStorage.removeItem('user');
                window.location.href = 'trangchu.html';
            }
        }

        window.onload = () => {
            if(checkLogin()) {
                loadMyCourses();
            }
        };

        window.onclick = () => {
            document.getElementById('dropdownUser')?.classList.remove('active');
        };
    </script>
</body>
</html>
