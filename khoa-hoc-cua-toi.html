<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học của tôi - HDC Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="w-10 h-10 rounded-full bg-white p-1">
                <span class="font-black text-xl tracking-tight uppercase">HDC STUDY</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm font-bold border-r pr-4 border-blue-700">Chào bạn học sinh!</span>
                <a href="#" class="hover:text-yellow-400 transition-colors"><i class="fas fa-user-circle text-xl"></i></a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto flex-1 p-8">
        <header class="mb-10 text-center">
            <h2 class="text-3xl font-black text-blue-900 uppercase italic mb-2">Khóa học của tôi</h2>
            <div class="h-1 w-20 bg-yellow-400 mx-auto rounded-full"></div>
            <p class="mt-4 text-gray-500 font-medium">Bắt đầu chinh phục kiến thức ngay hôm nay!</p>
        </header>

        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-spinner animate-spin text-4xl text-blue-900"></i>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t p-6 text-center text-gray-400 text-sm">
        © 2026 Toán thầy Thành - Vinh, Nghệ An
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function loadMyCourses() {
            const grid = document.getElementById('course-grid');
            
            // Bước 1: Lấy danh sách khóa học từ bảng 'courses'
            // (Sau này Thầy có thể kết nối với bảng course_enrollments để lọc theo từng học sinh)
            const { data: courses, error } = await supabaseClient
                .from('courses')
                .select('*')
                .eq('status', 'active'); // Chỉ hiện các khóa đang mở

            if (error) {
                grid.innerHTML = `<p class="text-red-500 text-center col-span-full">Lỗi tải khóa học: ${error.message}</p>`;
                return;
            }

            if (courses.length === 0) {
                grid.innerHTML = `<p class="text-gray-400 text-center col-span-full italic">Bạn chưa đăng ký khóa học nào.</p>`;
                return;
            }

            grid.innerHTML = courses.map(course => `
                <div class="bg-white rounded-[30px] shadow-sm border border-gray-100 overflow-hidden hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 flex flex-col">
                    <div class="h-48 overflow-hidden relative">
                        <img src="${course.thumbnail_url || 'https://via.placeholder.com/400x200'}" class="w-full h-full object-cover">
                        <div class="absolute top-4 right-4 bg-blue-900 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase">
                            Toán & Tin
                        </div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <h3 class="text-xl font-black text-blue-900 mb-3 uppercase leading-tight">${course.course_name}</h3>
                        <p class="text-gray-500 text-sm line-clamp-2 mb-6 font-medium">${course.description || 'Chưa có mô tả cho khóa học này.'}</p>
                        
                        <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">HDC STUDY</span>
                            <a href="hoc-vien-chuyen-de.html?id=${course.id}" class="bg-blue-900 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors shadow-lg shadow-blue-900/20">
                                Vào học ngay <i class="fas fa-arrow-right ml-2 text-[10px]"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        loadMyCourses();
    </script>
</body>
</html>
