<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học của tôi - Toán thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        /* Styles từ Menu Bar của Thầy */
        .dropdown-user {
            position: absolute; top: 120%; right: 0; width: 220px;
            background: white; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; flex-direction: column; padding: 10px 0;
            z-index: 100; border: 1px solid #f0f0f0;
        }
        .dropdown-user.active { display: flex; }
        .item-dropdown {
            padding: 12px 20px; font-size: 14px; font-weight: 600;
            color: #374151; transition: all 0.2s; display: flex; align-items: center;
        }
        .item-dropdown:hover { background: #f3f4f6; color: #1e40af; }
        .divider { height: 1px; background: #eee; margin: 5px 0; }
        
        .thanh-menu-ngang { background: #1e3a8a; color: white; }
        .khung-trang { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .danh-sach-menu { display: flex; gap: 20px; list-style: none; padding: 10px 0; }
        .item-menu { font-weight: bold; font-size: 15px; }
        .cum-logo { display: flex; align-items: center; gap: 10px; }
        .anh-dai-dien-logo { width: 50px; height: 50px; border-radius: 50%; }
        .ten-thuong-hieu-to { font-size: 20px; font-weight: 900; color: #1e3a8a; line-height: 1; }
        .ten-thuong-hieu-nho { font-size: 14px; color: #6b7280; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white shadow-md sticky top-0 z-[1000]">
        <div class="khung-trang flex items-center justify-between py-4">
            <a href="trangchu.html" class="cum-logo">
                <img src="logo.png" class="anh-dai-dien-logo border border-blue-100">
                <div>
                    <div class="ten-thuong-hieu-to tracking-tighter uppercase">Toán</div>
                    <div class="ten-thuong-hieu-nho uppercase tracking-widest text-[10px]">Thầy Thành</div>
                </div>
            </a>

            <div class="vung-tim-kiem hidden md:block flex-1 max-w-md mx-10">
                <input type="text" placeholder="Tìm khóa học của bạn..." class="w-full bg-gray-100 border-none p-2 px-4 rounded-full text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="cum-tai-khoan relative" id="user-section">
                <div class="flex gap-2">
                    <button class="px-5 py-2 text-blue-900 font-bold text-sm" onclick="location.href='login.html'">Đăng nhập</button>
                </div>
            </div>
        </div>

        <nav class="thanh-menu-ngang">
            <div class="khung-trang">
                <ul class="danh-sach-menu">
                    <li><a href="trangchu.html" class="item-menu opacity-80 hover:opacity-100">Trang chủ</a></li>
                    <li><a href="khoa-hoc-cua-toi.html" class="item-menu opacity-100 border-b-2 border-yellow-400 pb-1">Khóa học của tôi</a></li>
                    <li><a href="#" class="item-menu opacity-80 hover:opacity-100">Tài liệu miễn phí</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="khung-trang py-12">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-black text-blue-900 border-l-8 border-yellow-400 pl-4 uppercase tracking-tight">Khóa học của tôi</h2>
                <p class="text-gray-500 font-medium mt-2 ml-4">Chào mừng Thầy Thành quay trở lại học tập!</p>
            </div>
        </div>

        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-circle-notch animate-spin text-4xl text-blue-900"></i>
                <p class="text-gray-400 mt-4 font-bold uppercase text-xs tracking-widest">Đang kết nối dữ liệu HDC...</p>
            </div>
        </div>
    </main>

    <script id="user-logged-template" type="text/template">
        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleUserMenu(event)">
            <div class="text-right hidden md:block">
                <div class="text-blue-900 font-black text-sm uppercase leading-tight">{fullname}</div>
                <div class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">{role_text}</div>
            </div>
            <img src="logo.png" class="w-10 h-10 rounded-full border-2 border-blue-900 object-cover shadow-md">
            
            <div class="dropdown-user shadow-2xl" id="dropdownUser">
                {admin_option}
                <a href="thong-tin-ca-nhan.html" class="item-dropdown"><i class="fas fa-user-circle mr-3 text-blue-500"></i> Thông tin cá nhân</a>
                <a href="khoa-hoc-cua-toi.html" class="item-dropdown text-blue-700 bg-blue-50"><i class="fas fa-book-open mr-3"></i> Khóa học của tôi</a>
                <div class="divider"></div>
                <a href="javascript:void(0)" onclick="logout()" class="item-dropdown text-red-600"><i class="fas fa-sign-out-alt mr-3"></i> Đăng xuất</a>
            </div>
        </div>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- LOGIC MENU & ACCOUNT (GIỮ NGUYÊN TỪ TRANG CHỦ CỦA THẦY) ---
        function checkLogin() {
            const user = JSON.parse(localStorage.getItem('user'));
            const userSection = document.getElementById('user-section');
            if (user) {
                let template = document.getElementById('user-logged-template').innerHTML;
                let adminOption = user.role === 'admin' ? `
                    <a href="admin.html" class="item-dropdown text-blue-700 bg-blue-50 font-bold">
                        <i class="fas fa-user-shield mr-3"></i> TRANG QUẢN TRỊ
                    </a>
                    <div class="divider"></div>` : '';
                
                template = template.replace('{fullname}', user.fullname)
                                   .replace('{role_text}', user.role === 'admin' ? 'Quản trị viên' : 'Học sinh')
                                   .replace('{admin_option}', adminOption);
                userSection.innerHTML = template;
            } else {
                // Nếu chưa đăng nhập thì đá về trang login
                window.location.href = 'login.html';
            }
        }

        function toggleUserMenu(event) {
            event.stopPropagation();
            document.getElementById('dropdownUser')?.classList.toggle('active');
        }

        function logout() {
            if(confirm("Thầy muốn đăng xuất hệ thống?")) {
                localStorage.removeItem('user');
                window.location.href = 'trangchu.html';
            }
        }

        // --- LOGIC LẤY DỮ LIỆU KHÓA HỌC ---
        async function loadMyCourses() {
            const grid = document.getElementById('course-grid');
            const { data: courses, error } = await supabaseClient
                .from('courses')
                .select('*')
                .eq('status', 'active');

            if (error) {
                grid.innerHTML = `<p class="text-red-500 col-span-full font-bold">Lỗi: ${error.message}</p>`;
                return;
            }

            grid.innerHTML = courses.map(course => `
                <div class="bg-white rounded-[25px] shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300 group">
                    <div class="h-44 overflow-hidden relative">
                        <img src="${course.thumbnail_url || 'banner.png'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-blue-900/80 to-transparent"></div>
                        <div class="absolute bottom-4 left-4 text-white">
                            <span class="text-[10px] font-black bg-yellow-400 text-blue-900 px-2 py-0.5 rounded uppercase">Toán thầy Thành</span>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-lg font-black text-blue-900 uppercase leading-tight mb-2 line-clamp-2">${course.course_name}</h3>
                        <p class="text-gray-500 text-xs font-medium mb-6 line-clamp-2 italic">"${course.description || 'Chinh phục kỳ thi vào 10 cùng Thầy Thành.'}"</p>
                        <a href="hoc-vien-chuyen-de.html?id=${course.id}" class="block text-center bg-blue-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-800 transition-all shadow-lg shadow-blue-900/20">
                            VÀO HỌC NGAY <i class="fas fa-chevron-right ml-2 text-[10px]"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            checkLogin();
            loadMyCourses();
        };

        window.onclick = (e) => {
            if (!e.target.closest('.cum-tai-khoan')) document.getElementById('dropdownUser')?.classList.remove('active');
        };
    </script>
</body>
</html>
