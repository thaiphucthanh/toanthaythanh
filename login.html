<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Toán Thầy Thành</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-blue-900 p-8 text-center relative">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/mathematics.png')]"></div>
            <a href="index.html" class="inline-block mb-4">
                <img src="logo.png" alt="Logo" class="w-20 h-20 rounded-full border-4 border-white mx-auto shadow-lg bg-white">
            </a>
            <h1 id="welcomeTitle" class="text-white text-2xl font-black uppercase tracking-tight">Chào mừng bạn trở lại!</h1>
            <p class="text-blue-200 text-sm font-bold mt-2">Đăng nhập để tiếp tục chinh phục toán học</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-blue-900 font-bold mb-2 ml-1">Tài khoản học sinh</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-4 text-gray-400"></i>
                        <input type="text" id="identifier" placeholder="Nhập tên đăng nhập hoặc Email" required
                            class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-3 pl-12 pr-4 outline-none focus:border-blue-600 focus:bg-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="text-blue-900 font-bold mb-2 ml-1 block">Mật khẩu</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i>
                        <input type="password" id="password" placeholder="Nhập mật khẩu của bạn" required
                            class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-3 pl-12 pr-4 outline-none focus:border-blue-600 focus:bg-white transition-all">
                    </div>
                </div>

                <div class="flex items-center ml-1">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 rounded">
                        <label for="remember" class="ml-2 text-gray-600 text-sm font-semibold cursor-pointer">Ghi nhớ mật khẩu</label>
                    </div>
                    <div class="flex-1"></div>
                    <a href="#" class="text-blue-600 text-sm font-bold hover:underline">Quên mật khẩu?</a>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-1 text-lg uppercase">
                    Vào học ngay
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-500 font-semibold">
                    Chưa có tài khoản? 
                    <a href="register.html" class="text-yellow-600 font-black hover:underline">Đăng ký thành viên mới</a>
                </p>
                <div class="mt-6 pt-6 border-t border-gray-100">
                    <a href="index.html" class="text-gray-400 hover:text-blue-900 transition-colors">
                        <i class="fas fa-arrow-left mr-2"></i> Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUBPUrl = 'https://rznyagxrshwwocsvrabe.supabase.co';
        const SUBPKey = 'sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5';
        const supabaseClient = supabase.createClient(SUBPUrl, SUBPKey);
        
        // ==========================================================
        // ĐOẠN ĐƯỢC THÊM VÀO ĐỂ TỰ ĐỘNG CHÀO TÊN HỌC SINH
        // ==========================================================
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            try {
                const userObj = JSON.parse(savedUser);
                if (userObj && userObj.fullname) {
                    document.getElementById('welcomeTitle').innerText = `Chào mừng ${userObj.fullname} đã trở lại học!`;
                }
            } catch (err) {
                console.error("Lỗi đọc dữ liệu người dùng cũ:", err);
            }
        }
        // ==========================================================

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
        
            const identifierValue = document.getElementById('identifier').value.trim();
            const passwordValue = document.getElementById('password').value;
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = 'Đang đăng nhập...';
        
            try {
                let emailToLogin = identifierValue;
                
                if (!identifierValue.includes('@')) {
                    const { data: found, error: findError } = await supabaseClient
                        .from('accounts')
                        .select('email')
                        .eq('sdt', identifierValue)
                        .maybeSingle();
        
                    if (findError || !found?.email) {
                        alert('Không tìm thấy tài khoản với số điện thoại này hoặc hệ thống bị chặn!');
                        btn.disabled = false;
                        btn.innerText = 'Vào học ngay';
                        return;
                    }
                    emailToLogin = found.email;
                }
        
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: emailToLogin,
                    password: passwordValue
                });
        
                if (authError || !authData.user) {
                    alert('Thông tin đăng nhập không chính xác...');
                    btn.disabled = false;
                    btn.innerText = 'Vào học ngay';
                    return;
                }
        
                const { data: profile, error: profileError } = await supabaseClient
                    .from('accounts')
                    .select('id, fullname, role, sdt, status')
                    .eq('id', authData.user.id)
                    .maybeSingle();
        
                if (profileError || !profile || profile.status === 'inactive') {
                    await supabaseClient.auth.signOut(); 
                    alert('Tài khoản của em đã bị khoá hoặc không hợp lệ. Vui lòng liên hệ Thầy!');
                    btn.disabled = false;
                    btn.innerText = 'Vào học ngay';
                    return;
                }
        
                localStorage.setItem('user', JSON.stringify({
                    id: profile.id,
                    fullname: profile.fullname,
                    role: profile.role,
                    sdt: profile.sdt
                }));
        
                if (profile.role === 'admin' || profile.role === 'teacher') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'trangchu.html';
                }
        
            } catch (err) {
                alert('Lỗi kết nối đến máy chủ. Em vui lòng kiểm tra lại mạng nhé!');
                console.error(err);
                btn.disabled = false;
                btn.innerText = 'Vào học ngay';
            }
        });
    </script>
</body>
</html>
