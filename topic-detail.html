<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài học - HDC Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        .sidebar-item { cursor: pointer; transition: all 0.3s; border-radius: 15px; margin: 0 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .submenu { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .submenu.show { max-height: 500px; margin-top: 5px; }
        .rotate-180 { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-blue-900 text-white flex flex-col shadow-xl z-50">
        <div class="p-6 flex items-center gap-3 border-b border-blue-800">
            <a href="admin.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img src="logo.png" class="w-12 h-12 rounded-full bg-white p-1">
                <div>
                    <div class="font-black text-lg leading-tight text-white uppercase">HDC Study</div>
                    <div class="text-[10px] text-blue-200 uppercase tracking-widest font-bold">Quản lý bài học</div>
                </div>
            </a>
        </div>
        <nav class="flex-1 mt-4 overflow-y-auto custom-scrollbar">
            <a href="admin.html" class="sidebar-item p-4 flex items-center gap-3 mb-1">
                <i class="fas fa-home w-5 text-blue-300"></i>
                <span class="font-bold">Trang Welcome</span>
            </a>
            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('user-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-users w-5 text-blue-300"></i>
                        <span class="font-bold">Quản lý người dùng</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform"></i>
                </div>
                <div id="user-menu" class="submenu">
                    <a href="user-list.html" class="block py-3 pl-12 text-sm hover:text-yellow-400 italic">
                        <i class="fas fa-list-ul mr-2"></i> Danh sách người dùng
                    </a>
                    <a href="add-user.html" class="block py-3 pl-12 text-sm hover:text-yellow-400 italic">
                        <i class="fas fa-user-plus mr-2"></i> Thêm mới
                    </a>
                </div>
            </div>
            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('course-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-book w-5 text-blue-300"></i>
                        <span class="font-bold text-yellow-400">Quản lý khóa học</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform rotate-180"></i>
                </div>
                <div id="course-menu" class="submenu show">
                    <a href="course-list.html" class="block py-3 pl-12 text-sm text-yellow-400 font-bold border-l-4 border-yellow-400 bg-blue-800/50">
                        <i class="fas fa-list-ul mr-2"></i>Danh sách khóa học</a>
                    <a href="add-course.html" class="block py-3 pl-12 text-sm hover:text-yellow-400">
                        <i class="fas fa-plus-circle mr-2 opacity-70"></i>Thêm khóa học mới</a>
                </div>
                <a href="exam.html" class="sidebar-item p-4 flex items-center gap-3 mt-1">
                <i class="fas fa-edit w-5 text-blue-300"></i>
                <span class="font-bold">Thi Online</span>
            </a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 px-8 flex justify-between items-center border-b">
            <div>
                <span id="course-breadcrumb" class="text-[10px] font-black text-blue-400 uppercase tracking-widest">...</span>
                <h2 id="topic-title" class="text-xl font-black text-blue-900 uppercase">Đang tải chuyên đề...</h2>
            </div>
            <button onclick="history.back()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl font-bold text-sm hover:bg-gray-200">
                <i class="fas fa-chevron-left mr-2"></i>Quay lại
            </button>
        </header>

        <div class="p-8 flex-1 overflow-y-auto bg-gray-50 custom-scrollbar">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-lg font-black text-blue-900 uppercase">Danh sách bài học chi tiết</h3>
                        <p class="text-sm text-gray-500 italic">Quản lý nội dung, video và tài liệu từng bài học</p>
                    </div>
                    <button onclick="addNewLesson()" class="bg-blue-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-800 transition-all shadow-lg shadow-blue-900/20 flex items-center gap-2">
                        <i class="fas fa-plus"></i>
                        <span>Thêm bài học mới</span>
                    </button>
                </div>

                <div class="bg-white rounded-[30px] border border-gray-100 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50/50 border-b border-gray-100 text-[10px] font-black text-blue-900 uppercase tracking-widest">
                                <th class="p-5 pl-8">Tiêu đề bài học</th>
                                <th class="p-5">Insight</th>
                                <th class="p-5 text-center">Video</th>
                                <th class="p-5 text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="lesson-table-body" class="divide-y divide-gray-50">
                            </tbody>
                    </table>
                    <div id="loading" class="p-20 text-center">
                        <i class="fas fa-circle-notch animate-spin text-3xl text-blue-900"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rznyagxrshwwocsvrabe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const topicId = urlParams.get('topic_id');

        async function init() {
            if (!topicId) {
                alert("Thiếu ID chuyên đề!");
                return;
            }
            await loadTopicHeader();
            await fetchLessons();
        }

        async function loadTopicHeader() {
            // Lấy thông tin Topic và Course (để làm breadcrumb)
            const { data: topic } = await supabaseClient
                .from('topics')
                .select('topic_name, course_id')
                .eq('id', topicId)
                .single();
            
            if (topic) {
                document.getElementById('topic-title').innerText = topic.topic_name;
                const { data: course } = await supabaseClient.from('courses').select('course_name').eq('id', topic.course_id).single();
                if (course) document.getElementById('course-breadcrumb').innerText = "Khóa học: " + course.course_name;
            }
        }

        async function fetchLessons() {
            const tbody = document.getElementById('lesson-table-body');
            const loader = document.getElementById('loading');
            
            const { data: lessons, error } = await supabaseClient
                .from('lessons')
                .select('*')
                .eq('topic_id', topicId)
                .order('created_at', { ascending: true });

            loader.classList.add('hidden');

            if (error) { alert(error.message); return; }

            if (lessons.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-400 italic font-medium">Chưa có bài học nào trong chuyên đề này.</td></tr>`;
                return;
            }

            tbody.innerHTML = lessons.map(l => `
                <tr class="hover:bg-blue-50/20 transition-all group">
                    <td class="p-5 pl-8">
                        <div class="font-bold text-blue-900">${l.title}</div>
                        <div class="text-[10px] text-gray-400 italic">ID: ${l.id}</div>
                    </td>
                    <td class="p-5">
                        <div class="text-xs text-gray-600 line-clamp-1 max-w-xs">${l.insight || '---'}</div>
                    </td>
                    <td class="p-5 text-center">
                        ${l.video_url ? `<i class="fab fa-youtube text-red-500 text-lg"></i>` : `<i class="fas fa-video-slash text-gray-300"></i>`}
                    </td>
                    <td class="p-5">
                        <div class="flex justify-center gap-3">
                            <button class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteLesson('${l.id}')" class="p-2 text-red-400 hover:bg-red-50 rounded-lg"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function addNewLesson() {
    const { value: formValues } = await Swal.fire({
        title: '<span class="text-blue-900 font-black uppercase">Thêm bài học mới</span>',
        html: `
            <div class="text-left space-y-3">
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Tiêu đề bài học</label>
                    <input id="swal-title" class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ví dụ: Bài 1 - Ôn tập hình học">
                </div>
                
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Link YouTube (Nếu có)</label>
                    <input id="swal-video" class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://www.youtube.com/watch?v=...">
                </div>
                
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Insight (Nỗi đau của học sinh)</label>
                    <textarea id="swal-insight" class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none h-20" placeholder="Các em hay nhầm lẫn định lý..."></textarea>
                </div>
                
                <div class="mb-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Tài liệu PDF (Tùy chọn)</label>
                    <input id="swal-file" type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" accept=".pdf">
                </div>
            </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'Lưu bài học',
        cancelButtonText: 'Hủy',
        confirmButtonColor: '#1e3a8a',
        preConfirm: () => {
            const title = document.getElementById('swal-title').value;
            if (!title) { Swal.showValidationMessage('Thầy chưa nhập tên bài học ạ!'); return false; }
            return {
                title: title,
                video: document.getElementById('swal-video').value,
                insight: document.getElementById('swal-insight').value,
                file: document.getElementById('swal-file').files[0]
            }
        }
    });

    if (!formValues) return;

    Swal.fire({
        title: 'HDC Study đang lưu...',
        html: 'Đang xử lý dữ liệu và upload tài liệu...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });

    let finalDocs = [];

    // 1. Xử lý Upload file nếu Thầy có chọn file
    if (formValues.file) {
        const originalName = formValues.file.name;
        
        // Chuẩn hóa tên file: xóa dấu tiếng Việt, thay khoảng trắng bằng "-"
        const cleanName = originalName
            .toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Xóa dấu
            .replace(/[đĐ]/g, "d")
            .replace(/([^a-z0-9.]+)/g, '-') // Thay ký tự đặc biệt thành "-"
            .replace(/-+/g, "-") // Xóa gạch ngang thừa
            .replace(/^-|-$/g, ""); // Xóa gạch ngang ở đầu/cuối

        const fileName = `${Date.now()}-${cleanName}`;

        const { data: uploadData, error: uploadError } = await supabaseClient.storage
            .from('documents')
            .upload(fileName, formValues.file);

        if (uploadError) {
            Swal.fire('Lỗi upload!', uploadError.message, 'error');
            return;
        }

        // Lấy link công khai sau khi upload thành công
        const { data: urlData } = supabaseClient.storage.from('documents').getPublicUrl(fileName);
        finalDocs.push({ name: originalName, url: urlData.publicUrl });
    }

    // 2. Lưu vào bảng 'lessons' (Khớp các cột: topic_id, title, video_url, insight, documents)
    const { error: insertError } = await supabaseClient.from('lessons').insert([{
        topic_id: topicId,
        title: formValues.title,
        video_url: formValues.video,
        insight: formValues.insight,
        documents: finalDocs // Lưu dạng JSONB cho cột documents
    }]);

    if (insertError) {
        Swal.fire('Lỗi lưu Database!', insertError.message, 'error');
    } else {
        Swal.fire({
            icon: 'success',
            title: 'Đã thêm bài học!',
            text: 'Dữ liệu đã được cập nhật thành công.',
            timer: 1500,
            showConfirmButton: false
        });
        fetchLessons(); // Tải lại danh sách hiển thị
    }
}

        async function deleteLesson(id) {
            if(confirm('Xóa bài học này?')) {
                await supabaseClient.from('lessons').delete().eq('id', id);
                fetchLessons();
            }
        }

        function toggleSubmenu(id, element) {
            const menu = document.getElementById(id);
            const arrow = element.querySelector('.arrow-icon');
            menu.classList.toggle('show');
            if (arrow) arrow.classList.toggle('rotate-180');
        }

        init();
    </script>
</body>
</html>
