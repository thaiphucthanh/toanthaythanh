<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Ngân hàng câu hỏi - Toán thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-item { cursor: pointer; transition: all 0.3s; border-radius: 15px; margin: 0 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .submenu { display: none; flex-direction: column; background: rgba(0,0,0,0.2); }
        .submenu.show { display: flex; margin-top: 5px; }
        .rotate-180 { transform: rotate(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-blue-900 text-white flex flex-col shadow-xl z-50">
        <div class="p-6 flex items-center gap-3 border-b border-blue-800">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center font-black text-blue-900 italic shadow-lg">MT</div>
            <div>
                <div class="font-black text-lg leading-tight uppercase italic">TOÁN</div>
                <div class="text-[10px] text-blue-200 uppercase tracking-widest font-bold">Thầy Thành Admin</div>
            </div>
        </div>

        <nav class="flex-1 mt-4 overflow-y-auto custom-scrollbar">
            <a href="admin.html" class="sidebar-item p-4 flex items-center gap-3 mb-1 hover:bg-white/10 transition-all">
                <i class="fas fa-home w-5 text-blue-300"></i>
                <span class="font-bold text-sm uppercase">Trang Welcome</span>
            </a>

            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('user-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-users w-5 text-blue-300"></i>
                        <span class="font-bold text-sm uppercase">Quản lý người dùng</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform"></i>
                </div>
                <div id="user-menu" class="submenu">
                    <a href="user-list.html" class="block py-3 pl-12 text-xs hover:text-yellow-400 italic">Danh sách thành viên</a>
                </div>
            </div>

            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('course-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-book w-5 text-blue-300"></i>
                        <span class="font-bold text-sm uppercase">Quản lý khóa học</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform"></i>
                </div>
                <div id="course-menu" class="submenu">
                    <a href="course-list.html" class="block py-3 pl-12 text-xs hover:text-yellow-400 italic">Danh mục bài giảng</a>
                </div>
            </div>

            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('exam-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-graduation-cap w-5 text-blue-300"></i>
                        <span class="font-bold text-sm uppercase">Quản lý thi Online</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform rotate-180"></i>
                </div>
                <div id="exam-menu" class="submenu show flex flex-col bg-black/20 rounded-lg mt-1 mx-2">
                    <a href="exam.html" class="block py-3 pl-10 text-sm text-yellow-400 font-bold border-l-4 border-yellow-400 bg-blue-800/50 italic">
                        <i class="fas fa-database mr-2 text-[10px]"></i> Ngân hàng câu hỏi
                    </a>
                    <a href="#" class="block py-3 pl-10 text-xs hover:text-yellow-400 italic transition-all">
                        <i class="fas fa-random mr-2 text-[10px]"></i> Trộn đề & Tạo kỳ thi
                    </a>
                    <a href="#" class="block py-3 pl-10 text-xs hover:text-yellow-400 italic transition-all">
                        <i class="fas fa-poll mr-2 text-[10px]"></i> Kết quả làm bài
                    </a>
                </div>
            </div>
        </nav>

        <div class="p-4 border-t border-blue-800">
            <a href="trangchu.html" class="flex items-center gap-3 text-blue-300 hover:text-white p-3 rounded-xl hover:bg-white/5 transition-all">
                <i class="fas fa-arrow-left"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Về trang chủ</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-6 px-10 flex justify-between items-center border-b">
            <div>
                <h2 class="text-2xl font-black text-blue-900 uppercase italic">Ngân hàng câu hỏi</h2>
                <div class="h-1 w-16 bg-blue-900 rounded-full mt-1"></div>
            </div>
            <button onclick="openQuestionModal()" class="bg-blue-900 text-white px-8 py-3.5 rounded-2xl font-black text-xs hover:bg-blue-800 shadow-xl transition-all transform active:scale-95 flex items-center gap-3">
                <i class="fas fa-plus-circle text-lg"></i> THÊM CÂU HỎI MỚI
            </button>
        </header>

        <div class="p-8 flex-1 overflow-y-auto bg-gray-50 custom-scrollbar">
            <div class="max-w-7xl mx-auto">
                <div class="bg-white rounded-[40px] border border-gray-100 shadow-sm overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50 border-b border-gray-100 text-[11px] font-black text-blue-900 uppercase tracking-widest italic">
                                <th class="p-6 pl-10 w-48">Thông tin / Kỳ thi</th>
                                <th class="p-6">Nội dung câu hỏi</th>
                                <th class="p-6 text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="question-table-body" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function getCategories() {
            const { data: courses } = await supabaseClient.from('courses').select('id, name');
            const { data: topics } = await supabaseClient.from('topics').select('id, name');
            return { courses: courses || [], topics: topics || [] };
        }

        async function fetchQuestions() {
            const container = document.getElementById('question-table-body');
            container.innerHTML = '<tr><td colspan="3" class="p-20 text-center text-gray-300 italic text-sm font-black uppercase">Đang tải ngân hàng câu hỏi...</td></tr>';

            const { data: questions, error } = await supabaseClient.from('questions').select('*, courses(name), topics(name)').order('created_at', { ascending: false });
            if (error) return;

            container.innerHTML = '';
            questions.forEach(q => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/30 transition-all group";
                tr.innerHTML = `
                    <td class="p-6 pl-10">
                        <div class="text-[10px] font-black text-blue-900 uppercase italic mb-2 tracking-tighter">${q.question_type} • ${q.level}</div>
                        <div class="flex gap-1">
                            <span class="bg-blue-100 text-blue-700 px-2.5 py-1 rounded-lg text-[8px] font-black uppercase italic tracking-tighter">Học kỳ ${q.semester}</span>
                            <span class="bg-purple-100 text-purple-700 px-2.5 py-1 rounded-lg text-[8px] font-black uppercase italic tracking-tighter">${q.exam_category === 'mid' ? 'Giữa kỳ' : (q.exam_category === 'final' ? 'Cuối kỳ' : 'Vào 10')}</span>
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="text-[10px] font-black text-blue-600 uppercase mb-1 tracking-widest italic opacity-70">${q.courses?.name || 'KHÓA'} / ${q.topics?.name || 'CHUYÊN ĐỀ'}</div>
                        <div class="text-[15px] font-bold text-gray-800 line-clamp-2 italic leading-relaxed pr-10">${q.content}</div>
                    </td>
                    <td class="p-6">
                        <div class="flex justify-center gap-3">
                            <button onclick="deleteQuestion('${q.id}')" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center shadow-sm"><i class="fas fa-trash-alt text-[12px]"></i></button>
                            <button onclick='editQuestion(${JSON.stringify(q).replace(/'/g, "&apos;")})' class="w-10 h-10 rounded-xl bg-yellow-50 text-yellow-600 hover:bg-yellow-500 hover:text-white transition-all flex items-center justify-center shadow-sm"><i class="fas fa-edit text-[12px]"></i></button>
                        </div>
                    </td>
                `;
                container.appendChild(tr);
            });
            if (window.MathJax) MathJax.typesetPromise();
        }

        async function openQuestionModal(editData = null) {
            const isEdit = !!editData;
            const cats = await getCategories();

            const { value: formValues } = await Swal.fire({
                title: isEdit ? '<span class="italic font-black text-blue-900">CHỈNH SỬA CÂU HỎI</span>' : '<span class="italic font-black text-blue-900">THÊM CÂU HỎI MỚI</span>',
                width: '900px',
                padding: '2.5rem',
                showCancelButton: true,
                confirmButtonColor: '#1e3a8a',
                confirmButtonText: 'LƯU DỮ LIỆU',
                cancelButtonText: 'HỦY BỎ',
                html: `
                    <div class="text-left space-y-5">
                        <div class="bg-blue-900 text-white p-6 rounded-[35px] shadow-2xl">
                            <label class="text-[11px] font-black uppercase italic mb-3 block tracking-[3px] text-blue-200">PHẠM VI KIẾN THỨC</label>
                            <div class="grid grid-cols-2 gap-5">
                                <div class="bg-white/10 p-1 rounded-2xl border border-white/20">
                                    <select id="q-semester" class="w-full p-3.5 text-xs font-black outline-none bg-transparent text-white">
                                        <option value="1" class="text-black" ${isEdit && editData.semester==='1'?'selected':''}>HỌC KỲ 1</option>
                                        <option value="2" class="text-black" ${isEdit && editData.semester==='2'?'selected':''}>HỌC KỲ 2</option>
                                    </select>
                                </div>
                                <div class="bg-white/10 p-1 rounded-2xl border border-white/20">
                                    <select id="q-category" class="w-full p-3.5 text-xs font-black outline-none bg-transparent text-white">
                                        <option value="mid" class="text-black" ${isEdit && editData.exam_category==='mid'?'selected':''}>BÀI THI GIỮA KỲ</option>
                                        <option value="final" class="text-black" ${isEdit && editData.exam_category==='final'?'selected':''}>BÀI THI CUỐI KỲ</option>
                                        <option value="entrance" class="text-black" ${isEdit && editData.exam_category==='entrance'?'selected':''}>THI VÀO LỚP 10</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-5">
                            <select id="q-type" class="p-4 border-2 border-gray-100 rounded-2xl font-bold text-xs bg-gray-50 outline-none" onchange="updateAddForm(this.value)">
                                <option value="choice" ${isEdit && editData.question_type==='choice'?'selected':''}>Trắc nghiệm 4 lựa chọn</option>
                                <option value="true_false" ${isEdit && editData.question_type==='true_false'?'selected':''}>Đúng / Sai (True-False)</option>
                                <option value="short_answer" ${isEdit && editData.question_type==='short_answer'?'selected':''}>Trả lời ngắn / Điền số</option>
                                <option value="essay" ${isEdit && editData.question_type==='essay'?'selected':''}>Tự luận giải chi tiết</option>
                            </select>
                            <select id="q-level" class="p-4 border-2 border-gray-100 rounded-2xl font-bold text-xs bg-gray-50 outline-none">
                                <option value="easy" ${isEdit && editData.level==='easy'?'selected':''}>NHẬN BIẾT</option>
                                <option value="medium" ${isEdit && editData.level==='medium'?'selected':''}>THÔNG HIỂU</option>
                                <option value="hard" ${isEdit && editData.level==='hard'?'selected':''}>VẬN DỤNG CAO</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-5">
                            <select id="q-course" class="p-4 border-2 border-gray-100 rounded-2xl font-bold text-xs outline-none">
                                <option value="">-- CHỌN KHÓA HỌC --</option>
                                ${cats.courses.map(c => `<option value="${c.id}" ${isEdit && editData.course_id === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                            </select>
                            <select id="q-topic" class="p-4 border-2 border-gray-100 rounded-2xl font-bold text-xs outline-none">
                                <option value="">-- CHỌN CHUYÊN ĐỀ --</option>
                                ${cats.topics.map(t => `<option value="${t.id}" ${isEdit && editData.topic_id === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
                            </select>
                        </div>

                        <textarea id="q-content" placeholder="Nội dung đề bài ($ Latex $)..." class="w-full p-6 border-2 border-gray-100 rounded-[35px] h-36 text-[15px] font-bold shadow-inner outline-none focus:border-blue-500 italic">${isEdit ? editData.content : ''}</textarea>
                        <div id="q-dynamic-area" class="bg-gray-50 p-8 rounded-[35px] border-2 border-dashed border-gray-200"></div>
                        <textarea id="q-solution" placeholder="Hướng dẫn giải chi tiết..." class="w-full p-5 border-2 border-gray-100 rounded-[25px] h-24 text-sm italic bg-gray-50 outline-none font-medium">${isEdit ? (editData.solution_guide || '') : ''}</textarea>
                    </div>`,
                didOpen: () => updateAddForm(isEdit ? editData.question_type : 'choice', editData),
                preConfirm: () => {
                    const type = document.getElementById('q-type').value;
                    const payload = {
                        question_type: type, level: document.getElementById('q-level').value,
                        semester: document.getElementById('q-semester').value,
                        exam_category: document.getElementById('q-category').value,
                        course_id: document.getElementById('q-course').value,
                        topic_id: document.getElementById('q-topic').value,
                        content: document.getElementById('q-content').value,
                        solution_guide: document.getElementById('q-solution').value
                    };
                    if (type === 'choice') {
                        payload.options = { a: document.getElementById('opt-a').value, b: document.getElementById('opt-b').value, c: document.getElementById('opt-c').value, d: document.getElementById('opt-d').value };
                        payload.correct_answer = document.getElementById('q-correct').value;
                    } else if (type === 'true_false') {
                        const labels = document.querySelectorAll('.tf-label');
                        const stats = document.querySelectorAll('.tf-status');
                        payload.tf_options = Array.from(labels).map((el, i) => ({ label: el.value, is_true: stats[i].value === 'true' }));
                    } else if (type === 'short_answer') {
                        payload.correct_answer = document.getElementById('q-correct-short').value;
                    }
                    return payload;
                }
            });

            if (formValues) {
                const { error } = isEdit ? await supabaseClient.from('questions').update(formValues).eq('id', editData.id) : await supabaseClient.from('questions').insert([formValues]);
                if (!error) { Swal.fire({ icon: 'success', title: 'ĐÃ LƯU DỮ LIỆU!', timer: 1500, showConfirmButton: false }); fetchQuestions(); }
            }
        }

        function updateAddForm(type, data = null) {
            const area = document.getElementById('q-dynamic-area');
            if (type === 'choice') {
                area.innerHTML = `<div class="grid grid-cols-2 gap-5 text-xs font-black uppercase italic text-blue-900">${['a', 'b', 'c', 'd'].map(l => `<div class="flex items-center gap-4">${l}: <input id="opt-${l}" value="${data?.options?.[l] || ''}" class="flex-1 p-3.5 border border-gray-200 rounded-2xl outline-none focus:border-blue-500 bg-white shadow-sm font-bold"></div>`).join('')}<div class="col-span-2 mt-6 pt-6 border-t border-gray-200 flex items-center gap-5"><label class="text-[10px] font-black text-gray-400">PHƯƠNG ÁN ĐÚNG:</label><select id="q-correct" class="flex-1 p-4 border-2 border-blue-100 rounded-2xl font-black text-blue-900 bg-white">${['A', 'B', 'C', 'D'].map(l => `<option value="${l}" ${data?.correct_answer === l ? 'selected' : ''}>ĐÁP ÁN ${l}</option>`).join('')}</select></div></div>`;
            } else if (type === 'true_false') {
                area.innerHTML = `<div id="tf-container" class="space-y-4 font-bold text-xs">${(data?.tf_options || [{label: '', is_true: true},{label: '', is_true: true},{label: '', is_true: true},{label: '', is_true: true}]).map((opt, i) => `<div class="flex gap-4 items-center"><span>${i+1}.</span><input class="tf-label flex-1 p-4 border border-gray-200 rounded-2xl italic font-semibold" value="${opt.label}" placeholder="Ý nhỏ..."><select class="tf-status p-4 border border-gray-200 rounded-2xl text-blue-800 bg-white"><option value="true" ${opt.is_true ? 'selected' : ''}>ĐÚNG</option><option value="false" ${!opt.is_true ? 'selected' : ''}>SAI</option></select></div>`).join('')}</div>`;
            } else if (type === 'short_answer') {
                area.innerHTML = `<label class="text-[10px] font-black text-gray-400 uppercase italic mb-3 block">ĐÁP ÁN KHỚP (Ngăn cách bởi |):</label><input id="q-correct-short" value="${data?.correct_answer || ''}" placeholder="VD: 5|năm" class="w-full p-5 border-2 border-blue-100 rounded-[25px] font-black text-blue-900 uppercase italic outline-none focus:border-blue-500">`;
            } else {
                area.innerHTML = `<div class="p-4 text-center text-gray-300 italic text-[11px] uppercase font-black tracking-widest opacity-60">Tự luận: Thầy soạn nội dung giải chi tiết ở trên</div>`;
            }
        }

        async function deleteQuestion(id) {
            if ((await Swal.fire({ title: 'XÁC NHẬN XÓA?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'XÓA NGAY' })).isConfirmed) {
                await supabaseClient.from('questions').delete().eq('id', id);
                fetchQuestions();
            }
        }

        function editQuestion(data) { openQuestionModal(data); }
        function toggleSubmenu(id, el) { 
            const submenu = document.getElementById(id);
            const icon = el.querySelector('.arrow-icon');
            submenu.classList.toggle('show'); 
            icon?.classList.toggle('rotate-180'); 
        }
        document.addEventListener('DOMContentLoaded', fetchQuestions);
    </script>
</body>
</html>
