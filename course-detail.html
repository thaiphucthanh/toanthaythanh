    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rznyagxrshwwocsvrabe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');

        async function init() {
            if (!courseId) {
                alert("Không tìm thấy ID khóa học!");
                window.location.href = 'course-list.html';
                return;
            }
            await loadCourseInfo();
            await loadTopicsAndLessons();
        }

        async function loadCourseInfo() {
            const { data } = await supabaseClient.from('courses').select('course_name').eq('id', courseId).single();
            if (data) document.getElementById('course-title').innerText = data.course_name;
        }

        async function loadTopicsAndLessons() {
            const container = document.getElementById('topics-container');
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            container.innerHTML = '';

            // Lấy chuyên đề
            const { data: topics, error: tError } = await supabaseClient
                .from('topics')
                .select('*')
                .eq('course_id', courseId)
                .order('order_index', { ascending: true });

            if (tError) { alert(tError.message); return; }

            for (const topic of topics) {
                // Lấy bài học thuộc chuyên đề này
                const { data: lessons } = await supabaseClient
                    .from('lessons')
                    .select('*')
                    .eq('topic_id', topic.id);

                const topicCard = `
                    <div class="bg-white rounded-[25px] border border-gray-100 shadow-sm overflow-hidden transition-all hover:shadow-md">
                        <div class="p-5 bg-blue-50/50 flex justify-between items-center border-b border-blue-100">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-blue-900 text-white rounded-lg flex items-center justify-center font-black text-sm">
                                    ${topic.order_index || 0}
                                </div>
                                <h4 class="font-black text-blue-900 uppercase tracking-tight">${topic.topic_name}</h4>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="addLesson('${topic.id}')" class="text-[11px] font-black uppercase bg-white text-blue-600 px-4
