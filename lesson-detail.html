<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học bài giảng - Toán Thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; background-color: #f9fafb; overflow: hidden; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        .thanh-menu-ngang { background: #1e3a8a; color: white; }
        .lesson-item.active { background-color: #eff6ff; color: #1e3a8a; border-left: 4px solid #1e3a8a; }
        .submenu { display: none; }
        .submenu.show { display: block; }
        .dropdown-user { position: absolute; top: 120%; right: 0; width: 220px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; flex-direction: column; padding: 10px 0; z-index: 100; border: 1px solid #f0f0f0; }
        .dropdown-user.active { display: flex; }
        .item-dropdown { padding: 12px 20px; font-size: 14px; font-weight: 600; color: #374151; display: flex; align-items: center; text-decoration: none; }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm z-[1000] flex-none">
        <div class="px-6 py-3 flex items-center justify-between">
            <a href="trangchu.html" class="flex items-center gap-2">
                <img src="logo.png" class="w-10 h-10 rounded-full border">
                <div>
                    <div class="text-blue-900 font-black text-lg leading-none uppercase italic">Toán</div>
                    <div class="text-gray-400 font-bold text-[8px] tracking-widest uppercase">Thầy Thành</div>
                </div>
            </a>
            <div class="cum-tai-khoan relative" id="user-section"></div>
        </div>
        <nav class="thanh-menu-ngang px-6 py-2">
            <ul class="flex gap-6 list-none p-0 m-0">
                <li><a href="trangchu.html" class="text-white no-underline font-bold text-xs opacity-80 hover:opacity-100">Trang chủ</a></li>
                <li><a href="khoa-hoc-cua-toi.html" class="text-white no-underline font-bold text-xs border-b-2 border-yellow-400 pb-1">Khóa học của tôi</a></li>
                <li><a href="#" class="text-white no-underline font-bold text-xs opacity-80 hover:opacity-100">Tài liệu ôn thi</a></li>
            </ul>
        </nav>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 bg-white border-r flex flex-col shadow-inner z-40 flex-none">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h3 class="font-black text-blue-900 text-xs uppercase tracking-widest">Nội dung học tập</h3>
            </div>
            <nav id="sidebar-content" class="flex-1 overflow-y-auto sidebar-scroll p-2 space-y-1">
                <div class="text-center py-10"><i class="fas fa-spinner animate-spin text-blue-900"></i></div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto flex flex-col scroll-smooth bg-gray-50">
            <div class="p-6 md:p-10 flex-1">
                <div class="max-w-5xl mx-auto">
                    <div class="bg-black rounded-3xl overflow-hidden shadow-2xl aspect-video relative border-8 border-white mb-8 italic font-black">
                        <iframe id="video-frame" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white p-8 rounded-[30px] shadow-sm border border-gray-100">
                                <div id="lesson-topic-name" class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-2 italic">ĐANG TẢI CHUYÊN ĐỀ...</div>
                                <h1 id="lesson-title" class="text-3xl font-black text-blue-900 mb-4 tracking-tight uppercase">Tiêu đề bài học</h1>
                                <div id="lesson-content" class="text-gray-600 leading-relaxed font-medium space-y-4"></div>
                            </div>
                        </div>

                        <div class="lg:col-span-1">
                            <div class="bg-white p-6 rounded-[30px] shadow-sm border border-blue-100 sticky top-4">
                                <h3 class="font-black text-sm mb-4 text-blue-900 uppercase italic tracking-widest flex items-center gap-2">
                                    <i class="fas fa-file-pdf text-red-500"></i> TÀI LIỆU BÀI GIẢNG
                                </h3>
                                <div id="document-section" class="space-y-3"></div>
                                <div id="lesson-insight" class="mt-6 p-4 bg-blue-50 rounded-2xl text-[11px] text-blue-800 font-bold italic border-l-4 border-blue-900 leading-snug"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="bg-white border-t py-10 text-center flex-none mt-20">
                <div class="font-black text-blue-900 uppercase text-sm mb-1 tracking-widest italic">Toán Thầy Thành</div>
                <div class="text-gray-400 text-[10px] font-bold italic uppercase">Dạy học từ tâm - Nâng tầm kiến thức</div>
            </footer>
        </main>
    </div>

    <script id="user-logged-template" type="text/template">
        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleUserMenu(event)">
            <div class="text-right hidden md:block">
                <div class="text-blue-900 font-black text-xs uppercase leading-tight">{fullname}</div>
                <div class="text-gray-400 text-[9px] font-bold uppercase tracking-widest">{role_text}</div>
            </div>
            <img src="logo.png" class="w-9 h-9 rounded-full border-2 border-blue-900">
            <div class="dropdown-user shadow-2xl" id="dropdownUser">
                {admin_option}
                <a href="thong-tin-ca-nhan.html" class="item-dropdown"><i class="fas fa-user-circle mr-3"></i> Hồ sơ</a>
                <div class="border-t my-1"></div>
                <a href="javascript:void(0)" onclick="logout()" class="item-dropdown text-red-600"><i class="fas fa-sign-out-alt mr-3"></i> Đăng xuất</a>
            </div>
        </div>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        let currentLessonId = urlParams.get('id');

        function checkLogin() {
            const user = JSON.parse(localStorage.getItem('user'));
            const userSection = document.getElementById('user-section');
            if (user) {
                let template = document.getElementById('user-logged-template').innerHTML;
                let adminOption = user.role === 'admin' ? `<a href="admin.html" class="item-dropdown text-blue-700 bg-blue-50 font-bold italic">QUẢN TRỊ VIÊN</a>` : '';
                template = template.replace(/{fullname}/g, user.fullname).replace(/{role_text}/g, user.role === 'admin' ? 'Thầy Thành' : 'Học sinh').replace(/{admin_option}/g, adminOption);
                userSection.innerHTML = template;
            } else { window.location.href = 'login.html'; }
        }

        async function loadSidebar(courseId) {
            const { data: topics } = await supabaseClient.from('topics').select('*').eq('course_id', courseId).order('id', {ascending: true});
            const { data: lessons } = await supabaseClient.from('lessons').select('*').order('id', {ascending: true});
            const sidebar = document.getElementById('sidebar-content');
            sidebar.innerHTML = topics.map(topic => {
                const topicLessons = lessons.filter(l => l.topic_id === topic.id);
                return `
                    <div class="mb-1">
                        <div onclick="this.nextElementSibling.classList.toggle('show')" class="p-3 font-black text-[10px] text-gray-400 uppercase tracking-widest cursor-pointer hover:text-blue-900 flex justify-between">
                            ${topic.topic_name} <i class="fas fa-chevron-down text-[8px]"></i>
                        </div>
                        <div class="submenu show">
                            ${topicLessons.map(l => `
                                <div onclick="changeLesson('${l.id}')" class="lesson-item ${l.id == currentLessonId ? 'active' : ''} p-3 pl-6 text-[11px] font-bold rounded-xl cursor-pointer flex items-center gap-3 transition-all hover:bg-white uppercase">
                                    <i class="fas fa-play-circle ${l.id == currentLessonId ? 'text-blue-900' : 'text-gray-200'}"></i>
                                    <span class="truncate">${l.title}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

        async function fetchLessonData(id) {
            const { data: lesson } = await supabaseClient.from('lessons').select('*').eq('id', id).single();
            if (!lesson) return;

            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('lesson-content').innerHTML = lesson.content || "Nội dung đang cập nhật...";
            document.getElementById('lesson-insight').innerHTML = "💡 " + (lesson.insight || "Hãy tập trung nhé!");
            
            if (lesson.video_url) {
                let vid = lesson.video_url.includes('v=') ? lesson.video_url.split('v=')[1].split('&')[0] : lesson.video_url.split('/').pop();
                document.getElementById('video-frame').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            }

            // LẤY TÊN CHUYÊN ĐỀ TỪ BẢNG TOPICS
            const { data: topicData } = await supabaseClient.from('topics').select('topic_name, course_id').eq('id', lesson.topic_id).single();
            if(topicData) {
                document.getElementById('lesson-topic-name').innerText = topicData.topic_name;
                loadSidebar(topicData.course_id);
            }

            // XỬ LÝ 2 Ô TÀI LIỆU
            const docSection = document.getElementById('document-section');
            if (lesson.documents) {
                let docPath = lesson.documents.trim();
                let fullUrl = docPath.startsWith('http') ? docPath : `${SB_URL}/storage/v1/object/public/documents/${docPath}`;

                docSection.innerHTML = `
                    <a href="${fullUrl}" target="_blank" class="flex items-center p-3 bg-blue-900 text-white rounded-2xl hover:bg-blue-800 transition-all font-bold shadow-md">
                        <i class="fas fa-eye mr-3"></i>
                        <span class="text-[10px] uppercase tracking-wider">Xem tài liệu ngay</span>
                    </a>
                    <a href="${fullUrl}" download class="flex items-center p-3 bg-red-50 text-red-700 rounded-2xl hover:bg-red-600 hover:text-white transition-all font-bold border border-red-100">
                        <i class="fas fa-download mr-3"></i>
                        <span class="text-[10px] uppercase tracking-wider">Tải tài liệu về máy</span>
                    </a>`;
            } else {
                docSection.innerHTML = `<div class="p-4 bg-gray-50 text-gray-400 text-[10px] text-center rounded-2xl border border-dashed font-bold uppercase italic">Chưa có tài liệu</div>`;
            }
        }

        function changeLesson(id) {
            currentLessonId = id;
            window.history.pushState({}, '', `?id=${id}`);
            fetchLessonData(id);
        }

        function toggleUserMenu(e) { e.stopPropagation(); document.getElementById('dropdownUser')?.classList.toggle('active'); }
        function logout() { if(confirm("Đăng xuất?")) { localStorage.removeItem('user'); window.location.href = 'trangchu.html'; } }

        window.onload = () => { checkLogin(); if(currentLessonId) fetchLessonData(currentLessonId); };
        window.onclick = (e) => { if (!e.target.closest('.cum-tai-khoan')) document.getElementById('dropdownUser')?.classList.remove('active'); };
    </script>
</body>
</html>
