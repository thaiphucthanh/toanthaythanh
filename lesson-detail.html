<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học bài giảng - Toán Thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Tùy chỉnh thanh cuộn Sidebar */
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        
        .lesson-item.active { background-color: #1e3a8a; color: white; }
        .lesson-item.active i { color: #facc15; }
        
        .sidebar-item { cursor: pointer; transition: all 0.2s; }
        .submenu { display: none; }
        .submenu.show { display: block; }
    </style>
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-50 border-b">
        <div class="flex items-center gap-4">
            <a href="khoa-hoc-cua-toi.html" class="text-blue-900 hover:text-blue-700 transition-colors">
                <i class="fas fa-chevron-left text-xl"></i>
            </a>
            <h2 id="top-course-name" class="font-black text-blue-900 uppercase italic tracking-tight hidden md:block">Khóa học của tôi</h2>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <div id="user-name" class="text-sm font-black text-blue-900 uppercase leading-none">Thầy Thành</div>
                <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Học viên</div>
            </div>
            <img src="logo.png" class="w-10 h-10 rounded-full border-2 border-blue-900">
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 bg-white border-r flex flex-col shadow-lg z-40">
            <div class="p-4 bg-gray-50 border-b">
                <h3 class="font-black text-blue-900 text-sm uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-list-ul"></i> Nội dung khóa học
                </h3>
            </div>
            <nav id="sidebar-content" class="flex-1 overflow-y-auto sidebar-scroll p-2 space-y-2">
                <div class="text-center py-10">
                    <i class="fas fa-spinner animate-spin text-blue-900"></i>
                </div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-5xl mx-auto">
                <div class="bg-black rounded-3xl overflow-hidden shadow-2xl aspect-video relative border-4 border-white mb-8">
                    <iframe id="video-frame" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white p-8 rounded-[30px] shadow-sm border border-gray-100">
                            <div id="lesson-category" class="text-blue-600 font-bold uppercase text-[10px] tracking-[0.2em] mb-2">Toán Thầy Thành</div>
                            <h1 id="lesson-title" class="text-3xl font-black text-blue-900 mb-4 leading-tight">Đang tải tiêu đề...</h1>
                            <div id="lesson-content" class="text-gray-600 leading-relaxed font-medium"></div>
                        </div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="bg-white p-6 rounded-[30px] shadow-sm border border-blue-100 sticky top-4">
                            <h3 class="font-black text-lg mb-4 text-blue-900 flex items-center italic">
                                <i class="fas fa-file-pdf mr-2 text-red-500"></i> TÀI LIỆU BÀI HỌC
                            </h3>
                            <div id="document-section">
                                </div>
                            <p id="lesson-insight" class="mt-6 text-xs text-gray-400 italic border-t pt-4"></p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        let currentLessonId = urlParams.get('id');

        // 1. Tải toàn bộ cấu trúc khóa học vào Sidebar
        async function loadSidebar(courseId) {
            const { data: topics } = await supabaseClient.from('topics').select('*').eq('course_id', courseId).order('id', {ascending: true});
            const { data: lessons } = await supabaseClient.from('lessons').select('*').order('id', {ascending: true});

            const sidebar = document.getElementById('sidebar-content');
            sidebar.innerHTML = topics.map(topic => {
                const topicLessons = lessons.filter(l => l.topic_id === topic.id);
                return `
                    <div class="mb-2">
                        <div onclick="this.nextElementSibling.classList.toggle('show')" class="sidebar-item p-3 font-black text-xs text-gray-500 uppercase tracking-tighter flex justify-between items-center hover:text-blue-900">
                            <span>${topic.topic_name}</span>
                            <i class="fas fa-chevron-down text-[8px]"></i>
                        </div>
                        <div class="submenu show space-y-1">
                            ${topicLessons.map(l => `
                                <div onclick="changeLesson('${l.id}')" class="lesson-item ${l.id == currentLessonId ? 'active' : ''} p-3 pl-6 text-sm font-bold rounded-xl cursor-pointer flex items-center gap-3 hover:bg-blue-50 transition-all">
                                    <i class="fas fa-play-circle ${l.id == currentLessonId ? 'text-yellow-400' : 'text-gray-300'} text-xs"></i>
                                    <span class="truncate">${l.title}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 2. Tải nội dung bài học chi tiết
        async function fetchLessonData(id) {
            const { data: lesson } = await supabaseClient.from('lessons').select('*').eq('id', id).single();
            if (!lesson) return;

            // Đổi tiêu đề và nội dung
            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('lesson-content').innerHTML = lesson.content || "Nội dung đang được cập nhật...";
            document.getElementById('lesson-insight').innerText = "💡 " + (lesson.insight || "Kiến thức trọng tâm bài học.");
            
            // Xử lý Video YouTube
            if (lesson.video_url) {
                let vid = lesson.video_url.includes('v=') ? lesson.video_url.split('v=')[1].split('&')[0] : lesson.video_url.split('/').pop();
                document.getElementById('video-frame').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            }

            // Xử lý TÀI LIỆU ĐÍNH KÈM (Mở file ngay khi nhấn)
            const docSection = document.getElementById('document-section');
            if (lesson.documents) {
                docSection.innerHTML = `
                    <a href="${lesson.documents}" target="_blank" class="flex items-center p-4 bg-red-50 border border-red-100 rounded-2xl hover:bg-red-600 hover:text-white transition-all group shadow-sm">
                        <i class="fas fa-file-pdf mr-3 text-red-600 group-hover:text-white text-xl"></i>
                        <div class="overflow-hidden">
                            <div class="font-black text-xs uppercase tracking-tight">Tải tài liệu bài học</div>
                            <div class="text-[10px] opacity-70 truncate font-bold italic">Click để xem ngay</div>
                        </div>
                    </a>`;
            } else {
                docSection.innerHTML = `<div class="p-4 bg-gray-50 rounded-2xl text-gray-400 text-[10px] font-bold text-center border border-dashed uppercase italic">Chưa có tài liệu đính kèm</div>`;
            }

            // Lấy ID khóa học để load sidebar lần đầu
            const { data: topic } = await supabaseClient.from('topics').select('course_id').eq('id', lesson.topic_id).single();
            if(topic) loadSidebar(topic.course_id);
        }

        // 3. Hàm chuyển bài học nhanh
        function changeLesson(id) {
            currentLessonId = id;
            // Cập nhật URL mà không load lại trang
            window.history.pushState({}, '', `?id=${id}`);
            fetchLessonData(id);
        }

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if(user) document.getElementById('user-name').innerText = user.fullname;
            fetchLessonData(currentLessonId);
        };
    </script>
</body>
</html>
