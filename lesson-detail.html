<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài giảng - HDC Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-item { cursor: pointer; transition: all 0.3s; border-radius: 15px; margin: 0 10px; }
        .submenu { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .submenu.show { max-height: 500px; margin-top: 5px; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-blue-900 text-white flex flex-col shadow-xl z-50">
        <div class="p-6 flex items-center gap-3 border-b border-blue-800">
            <img src="logo.png" class="w-12 h-12 rounded-full bg-white p-1">
            <div>
                <div class="font-black text-lg leading-tight uppercase">HDC Study</div>
                <div class="text-[10px] text-blue-200 uppercase font-bold">Admin Panel</div>
            </div>
        </div>
        <nav class="flex-1 mt-4">
            <a href="admin.html" class="sidebar-item p-4 flex items-center gap-3 mb-1 hover:bg-white/10">
                <i class="fas fa-home w-5 text-blue-300"></i>
                <span class="font-bold">Trang Welcome</span>
            </a>
            <div class="sidebar-item p-4 flex items-center gap-3 bg-blue-800">
                <i class="fas fa-book-open w-5 text-yellow-400"></i>
                <span class="font-bold">Xem bài giảng</span>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 px-8 flex justify-between items-center border-b">
            <button onclick="history.back()" class="text-blue-900 font-bold hover:underline">
                <i class="fas fa-arrow-left mr-2"></i>Quay lại chuyên đề
            </button>
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold text-blue-900">Thầy Thành</span>
                <img src="logo.png" class="w-10 h-10 rounded-full border">
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-50">
            <div class="max-w-5xl mx-auto">
                <header class="mb-8 border-b pb-6">
                    <div id="lesson-category" class="text-blue-600 font-bold uppercase text-xs mb-2 tracking-widest">Đang tải...</div>
                    <h2 id="lesson-title" class="text-4xl font-black text-blue-900 leading-tight">Tiêu đề bài giảng</h2>
                    <p id="lesson-insight" class="mt-3 text-lg text-gray-500 italic">Insight học sinh...</p>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-black rounded-[30px] overflow-hidden shadow-2xl aspect-video relative border-4 border-white">
                            <iframe id="video-frame" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="bg-white p-8 rounded-[30px] shadow-sm border border-gray-100">
                            <h3 class="font-black text-xl mb-4 text-blue-900">Nội dung chi tiết</h3>
                            <div id="lesson-content" class="text-gray-700 leading-relaxed space-y-4 font-medium"></div>
                        </div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="bg-white p-6 rounded-[30px] shadow-sm border border-blue-100 sticky top-0">
                            <h3 class="font-black text-lg mb-4 text-blue-900 flex items-center italic">
                                <i class="fas fa-file-pdf mr-2 text-red-500"></i> Kho tài liệu
                            </h3>
                            <ul id="document-list" class="space-y-3">
                                <li class="p-4 bg-gray-50 rounded-2xl text-gray-400 text-sm">Đang tải tài liệu...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function fetchLessonData() {
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('id');
            if (!lessonId) return;

            const { data: lesson, error } = await supabaseClient.from('lessons').select('*').eq('id', lessonId).single();
            
            if (lesson) {
                document.getElementById('lesson-title').innerText = lesson.title;
                document.getElementById('lesson-insight').innerText = lesson.insight || "Thầy Thành chưa thêm insight cho bài này.";
                document.getElementById('lesson-category').innerText = lesson.category || "BÀI GIẢNG HDC";
                document.getElementById('lesson-content').innerHTML = lesson.content || "Nội dung đang được cập nhật...";

                if (lesson.video_url) {
                    let vid = lesson.video_url.includes('v=') ? lesson.video_url.split('v=')[1].split('&')[0] : lesson.video_url.split('/').pop();
                    document.getElementById('video-frame').src = `https://www.youtube.com/embed/${vid}`;
                }

                const docList = document.getElementById('document-list');
                // Sơ đồ của Thầy cột documents là jsonb hoặc text chứa link
                if (lesson.documents) {
                    docList.innerHTML = `
                        <a href="${lesson.documents}" target="_blank" class="flex items-center p-4 bg-blue-50 rounded-2xl hover:bg-blue-600 hover:text-white transition-all group font-bold text-blue-900">
                            <i class="far fa-file-pdf mr-3 text-red-500 group-hover:text-white text-xl"></i>
                            <span class="truncate">Tài liệu đính kèm</span>
                        </a>`;
                } else {
                    docList.innerHTML = "<li class='text-gray-400 italic text-sm p-4'>Chưa có tài liệu.</li>";
                }
            }
        }
        fetchLessonData();
    </script>
</body>
</html>
