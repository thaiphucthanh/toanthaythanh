// ============================================================
// CẤU HÌNH SUPABASE — dùng fetch thuần, không cần thư viện
// ============================================================
const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";

// Hàm query Supabase REST API trực tiếp
async function sbQuery(table, params = {}) {
  const url = new URL(`${SB_URL}/rest/v1/${table}`);

  // Thêm các filter dạng ?column=eq.value
  Object.entries(params).forEach(([key, val]) => {
    if (key === 'select') url.searchParams.set('select', val);
    else if (key === 'order') url.searchParams.set('order', val);
    else if (key === 'limit') url.searchParams.set('limit', val);
    else url.searchParams.set(key, val);
  });

  const res = await fetch(url.toString(), {
    method: 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      // Trả về single object nếu dùng .single()
      ...(params._single ? { 'Accept': 'application/vnd.pgrst.object+json' } : {})
    }
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`[${table}] HTTP ${res.status}: ${errText}`);
  }

  return res.json();
}

// Helper: query 1 record theo id
async function sbGetById(table, id, idType = 'int') {
  const url = new URL(`${SB_URL}/rest/v1/${table}`);
  url.searchParams.set('select', '*');
  if (idType === 'int') {
    url.searchParams.set('id', `eq.${parseInt(id)}`);
  } else {
    url.searchParams.set('id', `eq.${id}`);
  }

  const res = await fetch(url.toString(), {
    method: 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Accept': 'application/vnd.pgrst.object+json' // single object
    }
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`[${table}] HTTP ${res.status}: ${errText}`);
  }
  return res.json();
}

// ============================================================
const urlParams = new URLSearchParams(window.location.search);
const currentLessonId = urlParams.get('id');

// CHECK LOGIN
// ============================================================

        <div class="text-gray-400 text-[9px] font-bold uppercase tracking-widest italic">
          ${user.role === 'admin' ? 'Thầy Thành' : 'Học sinh'}

      </div>
      <div class="dropdown-user" id="dropdownUser">
        ${adminOption}
        <a href="thong-tin-ca-nhan.html" class="item-dropdown">
          <i class="fas fa-user-circle mr-3 opacity-50"></i> Hồ sơ cá nhân
        </a>
        <a href="khoa-hoc-cua-toi.html" class="item-dropdown">
          <i class="fas fa-graduation-cap mr-3 opacity-50"></i> Khóa học của tôi
        </a>
        <div class="border-t my-1 mx-4"></div>
        <a href="javascript:void(0)" onclick="logout()" class="item-dropdown text-red-600">

        </a>
      </div>
    </div>`;
  return user;
}

// ============================================================
// YOUTUBE ID
// ============================================================
function getYoutubeId(url) {
  if (!url) return null;
  const patterns = [
    /[?&]v=([^&\s]+)/,
    /youtu\.be\/([^?&\s]+)/,
    /youtube\.com\/embed\/([^?&\s]+)/,
    /youtube\.com\/shorts\/([^?&\s]+)/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// ============================================================
// RENDER VIDEO
// ============================================================
function renderVideo(videoUrl) {
  const frame = document.getElementById('video-frame');
  const noVideo = document.getElementById('no-video');
  const ytId = getYoutubeId(videoUrl);

  if (ytId) {
    frame.src = `https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1`;
    noVideo.style.display = 'none';
  } else {
    frame.src = '';
    frame.style.display = 'none';
    noVideo.style.removeProperty('display');
  }
}

// ============================================================
// RENDER DOCUMENTS
// ============================================================
function renderDocuments(docs) {
  const container = document.getElementById('document-container');

  let docList = null;
  try {
    docList = typeof docs === 'string' ? JSON.parse(docs) : docs;
  } catch (e) {
    docList = null;
  }

  if (!docList || !Array.isArray(docList) || docList.length === 0) {
    container.innerHTML = `
      <div class="p-6 bg-gray-50 text-gray-400 text-[10px] text-center rounded-[30px] border border-dashed uppercase italic">
        Chưa có tài liệu
      </div>`;
    return;
  }

  container.innerHTML = docList.map(file => `
    <div class="p-4 bg-gray-50 rounded-2xl border">
      <div class="text-[10px] font-bold text-blue-900 mb-3 flex items-center gap-2">
        <i class="fas fa-file-alt text-red-400"></i>
        ${file.name || 'Tài liệu'}
      </div>
      <div class="flex gap-2">
        <a href="${file.url}" target="_blank" rel="noopener"
           class="flex-1 py-2 bg-blue-900 text-white text-center rounded-lg text-[9px] font-black uppercase hover:bg-blue-800 transition">
          <i class="fas fa-eye mr-1"></i> Xem
        </a>
        <a href="${file.url}" download target="_blank" rel="noopener"
           class="flex-1 py-2 bg-white text-red-600 border border-red-200 text-center rounded-lg text-[9px] font-black uppercase hover:bg-red-50 transition">
          <i class="fas fa-download mr-1"></i> Tải
        </a>
      </div>
    </div>
  `).join('');
}

// ============================================================
// LOAD SIDEBAR
// ============================================================
async function loadSidebar(courseId, currentTopicId) {
  try {
    // Query topics theo course_id
    const topicsUrl = new URL(`${SB_URL}/rest/v1/topics`);
    topicsUrl.searchParams.set('select', 'id,topic_name,order_index');
    topicsUrl.searchParams.set('course_id', `eq.${courseId}`);
    topicsUrl.searchParams.set('order', 'order_index.asc,id.asc');

    const topicsRes = await fetch(topicsUrl.toString(), {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Accept': 'application/json' }
    });
    const topics = await topicsRes.json();

    if (!topics || topics.length === 0) {
      document.getElementById('sidebar-content').innerHTML =
        `<div class="text-center py-10 text-gray-300 text-xs italic">Không có chủ đề nào</div>`;
      return;
    }

    // Query tất cả lessons của course này (lọc theo topic_id in list)
    const topicIds = topics.map(t => `"${t.id}"`).join(',');
    const lessonsUrl = new URL(`${SB_URL}/rest/v1/lessons`);
    lessonsUrl.searchParams.set('select', 'id,title,topic_id,status');
    lessonsUrl.searchParams.set('topic_id', `in.(${topicIds})`);
    lessonsUrl.searchParams.set('order', 'id.asc');

    const lessonsRes = await fetch(lessonsUrl.toString(), {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Accept': 'application/json' }
    });
    const lessons = await lessonsRes.json();

    const sidebar = document.getElementById('sidebar-content');
    sidebar.innerHTML = topics.map(topic => {
      const topicLessons = (lessons || []).filter(l =>
        l.topic_id === topic.id && l.status !== 'inactive'
      );
      const isActive = topic.id === currentTopicId;

      return `
        <div class="mb-1">
          <div class="topic-header p-3 font-black text-[10px] uppercase cursor-pointer flex justify-between items-center rounded-xl
               ${isActive ? 'text-blue-900 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}"
               onclick="toggleTopic(this)">
            <span>${topic.topic_name}</span>
            <i class="fas fa-chevron-down chevron-icon text-[8px] transition-transform duration-200
               ${isActive ? 'rotate-180' : ''}"></i>
          </div>
          <div class="submenu ${isActive ? 'show' : ''}">
            ${topicLessons.length === 0
              ? `<div class="pl-8 py-2 text-[10px] text-gray-300 italic">Chưa có bài học</div>`
              : topicLessons.map(l => `
                  <div onclick="window.location.href='?id=${l.id}'"
                    class="lesson-item p-3 pl-8 text-[11px] font-semibold cursor-pointer rounded-lg mx-1 my-0.5
                    ${String(l.id) === String(currentLessonId) ? 'active' : 'text-gray-600'}">
                    ${l.title}
                  </div>`).join('')
            }
          </div>
        </div>`;
    }).join('');

  } catch (err) {
    console.error('Sidebar error:', err);
    document.getElementById('sidebar-content').innerHTML =
      `<div class="p-4 text-red-400 text-[10px]">Lỗi tải sidebar: ${err.message}</div>`;
  }
}

function toggleTopic(el) {
  const submenu = el.nextElementSibling;
  const icon = el.querySelector('.chevron-icon');
  submenu.classList.toggle('show');
  icon.classList.toggle('rotate-180');
}

// ============================================================
// FETCH LESSON DATA — hàm chính
// ============================================================
async function fetchLessonData(id) {
  const lessonId = parseInt(id);
  if (isNaN(lessonId)) {
    showError('ID bài học không hợp lệ: ' + id);
    return;
  }

  try {
    // ---- 1. Lấy lesson ----
    const lessonUrl = new URL(`${SB_URL}/rest/v1/lessons`);
    lessonUrl.searchParams.set('select', '*');
    lessonUrl.searchParams.set('id', `eq.${lessonId}`);

    const lessonRes = await fetch(lessonUrl.toString(), {
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Accept': 'application/vnd.pgrst.object+json' // single
      }
    });

    if (lessonRes.status === 406 || lessonRes.status === 404) {
      showError(`Không tìm thấy bài học với ID = ${lessonId}`);
      return;
    }
    if (!lessonRes.ok) {
      const errTxt = await lessonRes.text();
      showError(`Lỗi tải bài học (HTTP ${lessonRes.status}): ${errTxt}`);
      return;
    }

    const lesson = await lessonRes.json();

    // ---- 2. Render lesson ----
    document.getElementById('lesson-title').textContent = lesson.title || '(Không có tiêu đề)';
    document.getElementById('lesson-content').innerHTML = lesson.content || '<p class="text-gray-400 italic text-sm">Chưa có nội dung</p>';

    // Insight
    const insightEl = document.getElementById('lesson-insight');
    if (lesson.insight) {
      insightEl.innerHTML = '💡 ' + lesson.insight;
      insightEl.classList.remove('hidden');
    }

    // Video
    renderVideo(lesson.video_url);

    // Tài liệu
    renderDocuments(lesson.documents);

    // ---- 3. Lấy topic ----
    if (lesson.topic_id) {
      const topicUrl = new URL(`${SB_URL}/rest/v1/topics`);
      topicUrl.searchParams.set('select', 'id,topic_name,course_id');
      topicUrl.searchParams.set('id', `eq.${lesson.topic_id}`);

      const topicRes = await fetch(topicUrl.toString(), {
        headers: {
          'apikey': SB_KEY,
          'Authorization': `Bearer ${SB_KEY}`,
          'Accept': 'application/vnd.pgrst.object+json'
        }
      });

      if (topicRes.ok) {
        const topic = await topicRes.json();
        document.getElementById('lesson-topic-name').textContent = topic.topic_name || '';
        // ---- 4. Load sidebar ----
        await loadSidebar(topic.course_id, lesson.topic_id);
      }
    }

  } catch (err) {
    console.error('fetchLessonData error:', err);
    showError(`Lỗi kết nối: ${err.message}`);
  }
}

function showError(msg) {
  document.getElementById('lesson-title').textContent = 'Không thể tải bài học';
  const box = document.getElementById('error-box');
  box.classList.remove('hidden');
  box.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i>${msg}`;
}

// ============================================================
// USER MENU
// ============================================================
function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('dropdownUser')?.classList.toggle('active');
}
function logout() {
  localStorage.removeItem('user');
  window.location.href = 'login.html';
}
window.addEventListener('click', () => {
  document.getElementById('dropdownUser')?.classList.remove('active');
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  checkLogin();
  if (currentLessonId) {
    fetchLessonData(currentLessonId);
  } else {
    document.getElementById('lesson-title').textContent = 'Vui lòng chọn một bài học từ danh sách.';
    document.getElementById('document-container').innerHTML =
      `<div class="text-gray-300 text-[10px] italic text-center py-4">Chưa chọn bài học</div>`;
    document.getElementById('sidebar-content').innerHTML =
      `<div class="text-center py-10 text-gray-300 text-xs italic">Chưa có bài học nào được chọn</div>`;
  }
});
</script>

            <div class="space-y-6 sticky top-6">
              <div class="bg-white p-8 rounded-[40px] shadow-sm border border-blue-100">
                <h3 class="font-black text-xs mb-6 text-blue-900 uppercase italic tracking-widest flex items-center gap-3">
                  <i class="fas fa-file-pdf text-red-500 text-lg"></i> Kho tài liệu
                </h3>
                <div id="document-container" class="space-y-4"></div>
                <div id="lesson-insight" class="mt-8 p-5 bg-blue-50 rounded-[25px] text-[11px] text-blue-800 font-bold border-l-4 border-blue-900 leading-relaxed shadow-sm"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="bg-white border-t py-12 text-center flex-none mt-20">
      <div class="max-w-xs mx-auto mb-4 opacity-20"><div class="h-px bg-blue-900"></div></div>
      <div class="font-black text-blue-900 uppercase text-sm mb-1 tracking-[0.3em]">Toán Thầy Thành</div>
      <div class="text-gray-400 text-[10px] font-bold italic uppercase tracking-widest">Dạy học từ tâm - Nâng tầm kiến thức</div>
    </footer>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
  const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
  const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

  const urlParams = new URLSearchParams(window.location.search);
  // ✅ FIX 1: Giữ nguyên string để dùng cho so sánh sidebar, parse int khi query
  let currentLessonId = urlParams.get('id');

  // ✅ FIX 2: Sửa hàm checkLogin — thêm backtick đúng chỗ cho template literal
  function checkLogin() {
    const user = JSON.parse(localStorage.getItem('user'));
    const userSection = document.getElementById('user-section');
    if (!user) { window.location.href = 'login.html'; return; }

    const adminOption = user.role === 'admin'
      ? `<a href="admin.html" class="item-dropdown text-blue-700 bg-blue-50 font-bold italic">QUẢN TRỊ HỆ THỐNG</a>`
      : '';

    const roleText = user.role === 'admin' ? 'Thầy Thành' : 'Học sinh';

    userSection.innerHTML = `
      <div class="flex items-center gap-3 cursor-pointer" onclick="toggleUserMenu(event)">
        <div class="text-right hidden md:block">
          <div class="text-blue-900 font-black text-xs uppercase leading-tight">${user.fullname}</div>
          <div class="text-gray-400 text-[9px] font-bold uppercase tracking-widest italic">${roleText}</div>
        </div>
        <div class="relative">
          <img src="logo.png" class="w-10 h-10 rounded-full border-2 border-blue-900 object-cover shadow-sm">
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
        </div>
        <div class="dropdown-user" id="dropdownUser">
          ${adminOption}
          <a href="thong-tin-ca-nhan.html" class="item-dropdown"><i class="fas fa-user-circle mr-3 opacity-50"></i> Hồ sơ cá nhân</a>
          <a href="khoa-hoc-cua-toi.html" class="item-dropdown"><i class="fas fa-graduation-cap mr-3 opacity-50"></i> Khóa học của tôi</a>
          <div class="border-t my-1 mx-4"></div>
          <a href="javascript:void(0)" onclick="logout()" class="item-dropdown text-red-600"><i class="fas fa-sign-out-alt mr-3 opacity-70"></i> Đăng xuất</a>
        </div>
      </div>`;
  }

  function getYoutubeId(url) {
    if (!url) return null;
    const patterns = [
      /[?&]v=([^&]+)/,
      /youtu\.be\/([^?&]+)/,
      /youtube\.com\/embed\/([^?&]+)/,
      /youtube\.com\/shorts\/([^?&]+)/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  async function fetchLessonData(id) {
    document.getElementById('lesson-title').innerText = 'Đang tải...';

    // ✅ FIX 3: lessons.id là int4 — parse đúng kiểu
    const lessonId = parseInt(id);
    if (isNaN(lessonId)) {
      document.getElementById('lesson-title').innerText = 'Không tìm thấy bài học.';
      return;
    }

    const { data: lesson, error } = await supabaseClient
      .from('lessons')
      .select('*')
      .eq('id', lessonId)
      .single();

    if (error || !lesson) {
      console.error('Lỗi tải bài học:', error);
      document.getElementById('lesson-title').innerText = 'Không tìm thấy bài học.';
      return;
    }

    document.getElementById('lesson-title').innerText = lesson.title || '';
    document.getElementById('lesson-content').innerHTML = lesson.content || '';
    document.getElementById('lesson-insight').innerHTML = lesson.insight
      ? '💡 ' + lesson.insight : '';

    // Xử lý video
    const youtubeId = getYoutubeId(lesson.video_url);
    if (youtubeId) {
      document.getElementById('video-frame').src = `https://www.youtube.com/embed/${youtubeId}?rel=0`;
      document.getElementById('no-video').classList.add('hidden');
      document.getElementById('no-video').classList.remove('flex');
    } else {
      document.getElementById('video-frame').src = '';
      document.getElementById('no-video').classList.remove('hidden');
      document.getElementById('no-video').classList.add('flex');
    }

    renderDocuments(lesson.documents);

    // ✅ FIX 4: topic_id trong lessons là uuid — không parse int
    if (lesson.topic_id) {
      const { data: topic, error: topicErr } = await supabaseClient
        .from('topics')
        .select('topic_name, course_id')
        .eq('id', lesson.topic_id)
        .single();

      if (topicErr) console.error('Lỗi tải topic:', topicErr);

      if (topic) {
        document.getElementById('lesson-topic-name').innerText = topic.topic_name || '';
        await loadSidebar(topic.course_id, lesson.topic_id);
      }
    }
  }

  function renderDocuments(docs) {
    const container = document.getElementById('document-container');
    container.innerHTML = '';

    let docList;
    try {
      docList = typeof docs === 'string' ? JSON.parse(docs) : docs;
    } catch (e) {
      docList = null;
    }

    if (!docList || docList.length === 0) {
      container.innerHTML = `<div class="p-6 bg-gray-50 text-gray-400 text-[10px] text-center rounded-[30px] border border-dashed uppercase italic">Chưa có tài liệu</div>`;
      return;
    }

    docList.forEach((file) => {
      container.insertAdjacentHTML('beforeend', `
        <div class="p-4 bg-gray-50 rounded-2xl border mb-3">
          <div class="text-[10px] font-bold text-blue-900 mb-2">${file.name || 'Tài liệu'}</div>
          <div class="flex gap-2">
            <a href="${file.url}" target="_blank" class="flex-1 py-2 bg-blue-900 text-white text-center rounded-lg text-[9px] font-black uppercase">Xem</a>
            <a href="${file.url}" download target="_blank" class="flex-1 py-2 bg-white text-red-600 border text-center rounded-lg text-[9px] font-black uppercase">Tải</a>
          </div>
        </div>`);
    });
  }

  // ✅ FIX 5: Truyền thêm currentTopicId để auto-expand đúng chủ đề
  async function loadSidebar(courseId, currentTopicId) {
    const [{ data: topics, error: tErr }, { data: lessons, error: lErr }] = await Promise.all([
      supabaseClient.from('topics').select('id, topic_name').eq('course_id', courseId).order('order_index', { ascending: true }),
      supabaseClient.from('lessons').select('id, title, topic_id, status').order('id', { ascending: true })
    ]);

    if (tErr) console.error('Lỗi tải topics:', tErr);
    if (lErr) console.error('Lỗi tải lessons:', lErr);

    if (!topics || topics.length === 0) {
      document.getElementById('sidebar-content').innerHTML =
        `<div class="text-center py-10 text-gray-400 text-xs">Không có nội dung</div>`;
      return;
    }

    const sidebar = document.getElementById('sidebar-content');
    sidebar.innerHTML = topics.map(topic => {
      // Chỉ lấy lessons thuộc topic này và có status active (hoặc không có status)
      const topicLessons = (lessons || []).filter(l =>
        l.topic_id === topic.id && (l.status !== 'inactive')
      );

      // ✅ FIX 6: So sánh topic.id với currentTopicId (uuid vs uuid) — đúng kiểu
      const isCurrentTopic = topic.id === currentTopicId;

      return `
        <div class="mb-1">
          <div onclick="this.nextElementSibling.classList.toggle('show')"
            class="p-4 font-black text-[10px] uppercase cursor-pointer flex justify-between items-center rounded-xl ${isCurrentTopic ? 'text-blue-900 bg-blue-50' : 'text-gray-400'}">
            <span>${topic.topic_name}</span>
            <i class="fas fa-chevron-down transition-transform"></i>
          </div>
          <div class="submenu ${isCurrentTopic ? 'show' : ''}">
            ${topicLessons.length === 0
              ? `<div class="pl-8 py-2 text-[10px] text-gray-300 italic">Chưa có bài học</div>`
              : topicLessons.map(l => `
                  <div onclick="window.location.href='?id=${l.id}'"
                    class="lesson-item p-3 pl-8 text-[11px] font-bold cursor-pointer uppercase rounded-lg mx-1 my-0.5
                    ${String(l.id) === String(currentLessonId) ? 'active' : 'text-gray-600 hover:bg-gray-50'}">
                    ${l.title}
                  </div>`).join('')
            }
          </div>
        </div>`;
    }).join('');
  }

  function toggleUserMenu(e) {
    e.stopPropagation();
    document.getElementById('dropdownUser')?.classList.toggle('active');
  }

  function logout() {
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }

  window.onclick = () => document.getElementById('dropdownUser')?.classList.remove('active');

  window.onload = async () => {
    checkLogin();
    if (currentLessonId) {
      await fetchLessonData(currentLessonId);
    } else {
      document.getElementById('lesson-title').innerText = 'Vui lòng chọn một bài học.';
      document.getElementById('sidebar-content').innerHTML =
        `<div class="text-center py-10 text-gray-400 text-xs italic">Chọn bài học từ danh sách</div>`;
    }
  };
</script>
</body>
</html>
