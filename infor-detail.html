<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Tin & Lộ Trình - Toán Thầy Thành</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link class="rounded-full" rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .active-notice { border-left-color: #1e3a8a; background-color: #f0fdf4; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex flex-col">

    <header class="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="w-10 h-10 rounded-full border-2 border-white bg-white">
                <span class="font-black tracking-tight uppercase text-lg hidden sm:inline">Bảng Tin & Lộ Trình</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="adminPostBtn" onclick="openAdminModal()" class="hidden bg-yellow-500 hover:bg-yellow-600 text-blue-950 font-black px-4 py-2 rounded-xl text-sm shadow transition-all flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> Đăng bài mới
                </button>
                <a href="index.html" class="text-blue-200 hover:text-white font-bold text-sm flex items-center gap-1 transition-colors">
                    <i class="fas fa-home"></i> Về trang chủ
                </a>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div id="noticeListContainer" class="bg-white rounded-2xl shadow-md p-4 flex flex-col h-[calc(100vh-120px)] sticky top-20">
            <h2 class="text-blue-900 font-black text-lg border-b pb-3 mb-3 flex items-center gap-2">
                <i class="fas fa-bullhorn text-amber-500"></i> Danh mục bài viết
            </h2>
            
            <div id="noticeList" class="flex-1 overflow-y-auto space-y-3 pr-1">
                <div class="text-center py-8 text-gray-400">
                    <i class="fas fa-spinner animate-spin text-2xl mb-2 block"></i> Đang tải bảng tin...
                </div>
            </div>
        </div>

        <div id="noticeDetailContainer" class="hidden md:flex md:col-span-2 bg-white rounded-2xl shadow-md p-6 flex flex-col h-[calc(100vh-120px)] sticky top-20">
            <div id="noticeDetail" class="h-full flex flex-col justify-between">
                <div class="flex-1 flex flex-col items-center justify-center text-gray-400">
                    <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-3 border-2 border-dashed">
                        <i class="fas fa-envelope-open text-3xl"></i>
                    </div>
                    <p class="font-semibold text-sm text-center">Chào mừng em đến với Lộ trình học tập Thầy Thành!<br>Hãy chọn một mục thông báo bên trái để xem chi tiết.</p>
                </div>
            </div>
        </div>

    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-blue-900 text-white p-6 flex justify-between items-center">
                <h3 id="modalTitleText" class="font-black text-lg uppercase flex items-center gap-2">
                    <i class="fas fa-bullhorn"></i> Đăng thông báo mới
                </h3>
                <button onclick="closeAdminModal()" class="text-white/70 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <form id="adminPostForm" onsubmit="handleAdminPost(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="sm:col-span-2">
                        <label class="block text-blue-900 font-bold mb-1 ml-1 text-sm">Tiêu đề bài viết</label>
                        <input type="text" id="postTitle" required placeholder="Nhập tiêu đề lộ trình hoặc thông báo..."
                            class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl py-3 px-4 outline-none focus:border-blue-600 focus:bg-white transition-all font-semibold">
                    </div>
                    <div>
                        <label class="block text-blue-900 font-bold mb-1 ml-1 text-sm">Chế độ hiển thị</label>
                        <select id="postStatus" class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl py-3.5 px-3 outline-none focus:border-blue-600 focus:bg-white transition-all font-bold text-sm text-blue-900">
                            <option value="true">🌐 Công khai</option>
                            <option value="false">🔒 Riêng tư (Nháp)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-blue-900 font-bold mb-1 ml-1 text-sm">Nội dung chi tiết</label>
                    <textarea id="postContent" required rows="5" placeholder="Nhập dặn dò, hướng dẫn học sinh..."
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl py-3 px-4 outline-none focus:border-blue-600 focus:bg-white transition-all font-semibold"></textarea>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-blue-50/50 p-4 rounded-2xl border border-blue-100/80">
                    <div>
                        <label class="block text-blue-900 font-bold mb-1 ml-1 text-sm"><i class="fas fa-pen text-xs text-blue-500 mr-1"></i> Tên nút hiển thị (Tùy chọn)</label>
                        <input type="text" id="postBtnText" placeholder="Ví dụ: Đăng ký học ngay, Xem khóa mới..."
                            class="w-full bg-white border-2 border-gray-200 rounded-xl py-2.5 px-4 outline-none focus:border-blue-600 transition-all font-semibold text-sm">
                    </div>
                    <div>
                        <label class="block text-blue-900 font-bold mb-1 ml-1 text-sm"><i class="fas fa-link text-xs text-blue-500 mr-1"></i> Đường dẫn liên kết (Tùy chọn)</label>
                        <input type="url" id="postBtnLink" placeholder="Ví dụ: https://link-form-dang-ky..."
                            class="w-full bg-white border-2 border-gray-200 rounded-xl py-2.5 px-4 outline-none focus:border-blue-600 transition-all font-semibold text-sm">
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeAdminModal()" class="px-5 py-2.5 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-all">Hủy</button>
                    <button type="submit" id="btnSubmitPost" class="px-6 py-2.5 bg-blue-700 text-white rounded-xl font-black hover:bg-blue-800 transition-all flex items-center gap-2 shadow-md">
                        <i class="fas fa-paper-plane"></i> Đăng bài ngay
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUBPUrl = 'https://rznyagxrshwwocsvrabe.supabase.co';
        const SUBPKey = 'sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5';
        const supabaseClient = supabase.createClient(SUBPUrl, SUBPKey);

        let currentUser = null;
        let allAnnouncements = [];
        let editingId = null; 
        let readList = JSON.parse(localStorage.getItem('read_announcements') || '[]');

        window.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                currentUser = JSON.parse(userStr);
                if (currentUser.role === 'admin' || currentUser.role === 'teacher') {
                    document.getElementById('adminPostBtn').classList.remove('hidden');
                }
            }
            loadAnnouncements();
        });

        // Tải danh sách bài viết từ Supabase và phân quyền ẩn/hiện bài viết bảo mật
        async function loadAnnouncements() {
            try {
                const { data, error } = await supabaseClient
                    .from('announcements')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                const rawData = data || [];
                const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'teacher');
                
                // Thuật toán lọc: Học sinh chỉ xem bài có is_public !== false. Thầy xem được hết.
                if (!isAdmin) {
                    allAnnouncements = rawData.filter(item => item.is_public !== false);
                } else {
                    allAnnouncements = rawData;
                }
                
                renderNoticeList();
            } catch (err) {
                console.error(err);
                document.getElementById('noticeList').innerHTML = `<div class="text-center text-red-500 font-semibold text-xs py-4">Lỗi kết nối máy chủ!</div>`;
            }
        }

        // Render danh sách bên trái (Hiện tag Nháp cho Thầy biết bài nào đang ẩn)
        function renderNoticeList() {
            const listEl = document.getElementById('noticeList');
            if (allAnnouncements.length === 0) {
                listEl.innerHTML = `<div class="text-center text-gray-400 py-8 text-xs font-medium">Chưa có bài viết nào được đăng.</div>`;
                return;
            }

            listEl.innerHTML = allAnnouncements.map(item => {
                const date = new Date(item.created_at).toLocaleDateString('vi-VN', {hour: '2-digit', minute:'2-digit'});
                const isRead = readList.includes(item.id);
                
                // Nếu bài viết đang ở chế độ riêng tư, chèn thêm chiếc nhãn đỏ này vào tiêu đề
                const privateBadge = (item.is_public === false) ? `<span class="bg-red-100 text-red-700 text-[10px] font-black px-1.5 py-0.5 rounded mr-1.5 uppercase inline-flex items-center gap-0.5"><i class="fas fa-lock text-[9px]"></i> Nháp</span>` : '';
                
                return `
                    <div onclick="viewDetail('${item.id}')" id="card-${item.id}" 
                         class="p-3 bg-gray-50 border-l-4 border-gray-200 rounded-r-xl cursor-pointer hover:bg-blue-50/50 transition-all relative">
                        <div class="flex justify-between items-start gap-2">
                            <h4 class="font-bold text-gray-800 text-sm line-clamp-1 ${!isRead ? 'text-blue-900 font-black' : ''}">
                                ${privateBadge}${item.title}
                            </h4>
                            ${(!isRead && item.is_public !== false) ? '<span id="badge-'+item.id+'" class="w-2 h-2 bg-red-500 rounded-full flex-shrink-0 mt-1.5 animate-pulse"></span>' : ''}
                        </div>
                        <p class="text-[11px] text-gray-400 font-semibold mt-1"><i class="far fa-clock"></i> ${date}</p>
                    </div>
                `;
            }).join('');
        }

        // Xem nội dung chi tiết bài viết
        function viewDetail(id) {
            document.querySelectorAll('#noticeList > div').forEach(el => el.classList.remove('active-notice'));
            document.getElementById(`card-${id}`)?.classList.add('active-notice');

            const item = allAnnouncements.find(n => n.id == id);
            if (!item) return;

            if (!readList.includes(id) && item.is_public !== false) {
                readList.push(id);
                localStorage.setItem('read_announcements', JSON.stringify(readList));
                document.getElementById(`badge-${id}`)?.remove();
            }

            const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'teacher');
            const date = new Date(item.created_at).toLocaleString('vi-VN');
            
            let actionButtonHtml = '';
            if (item.btn_link && item.btn_link.trim() !== '') {
                const textButton = (item.btn_text && item.btn_text.trim() !== '') ? item.btn_text : 'Xem chi tiết ngay';
                actionButtonHtml = `
                    <div class="mt-6 pt-4 border-t border-gray-100 flex justify-start">
                        <a href="${item.btn_link}" target="_blank" class="inline-flex items-center gap-2 bg-yellow-500 hover:bg-yellow-600 text-blue-950 font-black px-6 py-3 rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all text-sm uppercase tracking-wide">
                            <i class="fas fa-external-link-alt"></i> ${textButton}
                        </a>
                    </div>
                `;
            }
            
            // Nhãn hiển thị trạng thái trong trang chi tiết bài viết của Thầy
            const detailStatusHtml = (item.is_public === false) ? `<span class="bg-red-600 text-white text-[10px] font-black px-2 py-0.5 rounded-md uppercase"><i class="fas fa-eye-slash"></i> Đang Ẩn (Riêng tư)</span>` : `<span class="bg-green-600 text-white text-[10px] font-black px-2 py-0.5 rounded-md uppercase"><i class="fas fa-globe"></i> Công Khai</span>`;

            document.getElementById('noticeDetail').innerHTML = `
                <div class="flex-1 overflow-y-auto space-y-4 pr-1 flex flex-col justify-between">
                    <div>
                        <button onclick="backToList()" class="md:hidden mb-2 bg-blue-50 hover:bg-blue-100 text-blue-900 text-xs font-black px-3 py-2 rounded-xl border border-blue-200 transition-all flex items-center gap-1.5">
                            <i class="fas fa-chevron-left"></i> Quay lại danh sách
                        </button>

                        <div class="flex flex-col sm:flex-row justify-between items-start gap-4">
                            <h3 class="text-xl font-black text-blue-900 leading-tight flex-1">${item.title}</h3>
                            
                            ${isAdmin ? `
                                <div class="flex gap-2 flex-shrink-0">
                                    <button onclick="openAdminModal('${item.id}')" class="bg-amber-500 hover:bg-amber-600 text-blue-950 font-black px-3 py-1.5 rounded-xl text-xs shadow transition-all flex items-center gap-1">
                                        <i class="fas fa-edit"></i> Sửa
                                    </button>
                                    <button onclick="deleteAnnouncement('${item.id}')" class="bg-red-600 hover:bg-red-700 text-white font-black px-3 py-1.5 rounded-xl text-xs shadow transition-all flex items-center gap-1">
                                        <i class="fas fa-trash-alt"></i> Xóa
                                    </button>
                                </div>
                            ` : ''}
                        </div>

                        <div class="text-xs text-gray-400 font-bold flex flex-wrap items-center gap-2 border-b pb-3 mb-3">
                            <span><i class="far fa-calendar-alt"></i> Ngày đăng: ${date}</span>
                            <span>•</span>
                            <span class="text-blue-600"><i class="fas fa-user-graduate"></i> Tác giả: Thầy Thành</span>
                            ${isAdmin ? `<span>•</span> ${detailStatusHtml}` : ''}
                        </div>
                        <div class="text-gray-700 text-sm leading-relaxed font-medium whitespace-pre-line pt-1">
                            ${item.content}
                        </div>
                    </div>
                    
                    ${actionButtonHtml}
                </div>
            `;

            if (window.innerWidth < 768) {
                document.getElementById('noticeListContainer').classList.add('hidden');
                document.getElementById('noticeDetailContainer').classList.remove('hidden');
            }
        }

        function backToList() {
            document.getElementById('noticeListContainer').classList.remove('hidden');
            document.getElementById('noticeDetailContainer').classList.add('hidden');
        }

        // Mở Modal Đăng/Sửa bài (Đọc và nạp dữ liệu trạng thái is_public)
        function openAdminModal(id = null) {
            if (id) {
                editingId = id; 
                const item = allAnnouncements.find(n => n.id == id);
                document.getElementById('modalTitleText').innerHTML = '<i class="fas fa-edit"></i> Chỉnh sửa bài viết';
                document.getElementById('postTitle').value = item.title;
                document.getElementById('postContent').value = item.content;
                document.getElementById('postBtnText').value = item.btn_text || '';
                document.getElementById('postBtnLink').value = item.btn_link || '';
                document.getElementById('postStatus').value = (item.is_public !== false) ? "true" : "false";
                document.getElementById('btnSubmitPost').innerHTML = '<i class="fas fa-save"></i> Cập nhật ngay';
            } else {
                editingId = null; 
                document.getElementById('modalTitleText').innerHTML = '<i class="fas fa-bullhorn"></i> Đăng thông báo mới';
                document.getElementById('adminPostForm').reset();
                document.getElementById('postStatus').value = "true"; // Mặc định tạo bài mới là công khai
                document.getElementById('btnSubmitPost').innerHTML = '<i class="fas fa-paper-plane"></i> Đăng bài ngay';
            }
            document.getElementById('adminModal').style.display = 'flex';
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('adminPostForm').reset();
            editingId = null;
        }

        // Gửi dữ liệu đồng bộ lên Supabase bao gồm cả biếnis_public
        async function handleAdminPost(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmitPost');
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const btn_text = document.getElementById('postBtnText').value.trim();
            const btn_link = document.getElementById('postBtnLink').value.trim();
            const is_public = document.getElementById('postStatus').value === "true";

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Đang xử lý...';

            try {
                if (editingId) {
                    const { error } = await supabaseClient
                        .from('announcements')
                        .update({ title, content, btn_text, btn_link, is_public })
                        .eq('id', editingId);

                    if (error) throw error;
                    Swal.fire('Thành công', 'Đã cập nhật bài viết thành công!', 'success');
                } else {
                    const { error } = await supabaseClient
                        .from('announcements')
                        .insert([{ title, content, btn_text, btn_link, is_public }]);

                    if (error) throw error;
                    Swal.fire('Thành công', 'Đã thêm bài viết mới thành công!', 'success');
                }

                closeAdminModal();
                await loadAnnouncements();
                
                if (editingId) viewDetail(editingId);

            } catch (err) {
                console.error(err);
                Swal.fire('Lỗi', 'Thao tác không thành công, hãy kiểm tra lại.', 'error');
            } finally {
                btnSubmit.disabled = false;
            }
        }

        // Xóa bài viết vĩnh viễn khỏi hệ thống
        async function deleteAnnouncement(id) {
            const result = await Swal.fire({
                title: 'Thầy chắc chắn muốn xóa?',
                text: "Hành động này sẽ gỡ bỏ bài viết vĩnh viễn khỏi bảng tin của học sinh!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Đúng vậy, xóa đi!',
                cancelButtonText: 'Hủy bỏ'
            });

            if (result.isConfirmed) {
                try {
                    const { error } = await supabaseClient
                        .from('announcements')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;

                    Swal.fire('Đã xóa', 'Bài viết đã được gỡ bỏ khỏi hệ thống thành công.', 'success');
                    
                    if (window.innerWidth < 768) {
                        backToList();
                    } else {
                        document.getElementById('noticeDetail').innerHTML = `
                            <div class="flex-1 flex flex-col items-center justify-center text-gray-400">
                                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-3 border-2 border-dashed">
                                    <i class="fas fa-envelope-open text-3xl"></i>
                                </div>
                                <p class="font-semibold text-sm text-center">Đã xóa thông báo thành công!</p>
                            </div>
                        `;
                    }
                    
                    loadAnnouncements(); 

                } catch (err) {
                    console.error(err);
                    Swal.fire('Lỗi hệ thống', 'Không thể hoàn tất tác vụ xóa dữ liệu.', 'error');
                }
            }
        }
    </script>
</body>
</html>
