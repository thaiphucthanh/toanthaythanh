<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Học Trực Tuyến - Toán Thầy Thành</title>
    <link class="rounded-full" rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        #meetContainer iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
    </style>
</head>
<body class="bg-slate-900 h-screen flex flex-col overflow-hidden">

    <header class="h-16 bg-slate-950 text-white px-4 border-b border-slate-800 flex justify-between items-center z-50 shadow-md flex-shrink-0">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="w-9 h-9 rounded-full bg-white border border-slate-700">
            <div>
                <h1 id="classTitle" class="text-sm font-black text-slate-200 uppercase tracking-wide">Phòng Học Trực Tuyến</h1>
                <p class="text-[11px] text-emerald-400 font-bold flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Hệ thống Live bảo mật
                </p>
            </div>
        </div>
        <div>
            <a href="trangchu.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-bold text-xs px-4 py-2 rounded-xl transition-all flex items-center gap-1.5 border border-slate-700">
                <i class="fas fa-sign-out-alt"></i> Rời phòng học
            </a>
        </div>
    </header>

    <main id="meetContainer" class="flex-1 w-full bg-slate-950 relative overflow-hidden flex items-center justify-center p-4">
        
        <div id="roomSelector" class="w-full max-w-2xl text-center space-y-6 z-40">
            <div>
                <h2 class="text-xl md:text-2xl font-black text-slate-100 uppercase tracking-wider">Chào mừng em đến với lớp học trực tuyến</h2>
                <p class="text-xs md:text-sm text-slate-400 mt-1">Vui lòng chọn môn học hôm nay để kết nối vào phòng Livestream chính xác:</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4">
                <button onclick="chooseRoom('toanthaythanh', 'Toán')" 
                        class="flex flex-col items-center justify-center bg-slate-900 hover:bg-blue-950/50 border-2 border-slate-800 hover:border-blue-500 rounded-2xl p-6 text-slate-200 transition-all group shadow-xl">
                    <div class="w-14 h-14 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400 text-2xl mb-4 group-hover:scale-110 transition-transform">
                        <i class="fas fa-calculator"></i>
                    </div>
                    <span class="text-base font-black tracking-wide uppercase">VÀO PHÒNG HỌC TOÁN</span>
                    <span class="text-[11px] text-slate-500 mt-1 font-semibold">Mã phòng: toanthaythanh</span>
                </button>

                <button onclick="chooseRoom('tinthaythanh', 'Tin Học')" 
                        class="flex flex-col items-center justify-center bg-slate-900 hover:bg-emerald-950/50 border-2 border-slate-800 hover:border-emerald-500 rounded-2xl p-6 text-slate-200 transition-all group shadow-xl">
                    <div class="w-14 h-14 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 text-2xl mb-4 group-hover:scale-110 transition-transform">
                        <i class="fas fa-laptop-code"></i>
                    </div>
                    <span class="text-base font-black tracking-wide uppercase">VÀO PHÒNG TIN HỌC</span>
                    <span class="text-[11px] text-slate-500 mt-1 font-semibold">Mã phòng: tinthaythanh</span>
                </button>
            </div>
        </div>

    </main>

    <script>
        let currentUser = null; 

        // 1. KIỂM TRA BẢO MẬT KHÔNG ĐỔI (Chặn người dùng chưa đăng nhập)
        const userStr = localStorage.getItem('user');
        if (!userStr) {
            window.stop(); 
            alert("Quyền truy cập bị từ chối! Vui lòng đăng nhập tài khoản học viên để vào phòng.");
            window.location.href = "index.html"; 
        } else {
            currentUser = JSON.parse(userStr);
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Đặt tiêu đề ban đầu khi học sinh chưa chọn phòng
            document.getElementById('classTitle').innerText = "Vui lòng chọn môn học";
        });

        // 2. LOGIC XỬ LÝ KHI NHẤN CHỌN MÔN HỌC
        function chooseRoom(roomName, subjectLabel) {
            // Bước A: Đổi lại thanh tiêu đề Header cho thân thiện và chuyên nghiệp hơn
            if (currentUser.role === 'admin' || currentUser.role === 'teacher') {
                document.getElementById('classTitle').innerText = `Lớp học ${subjectLabel} (Bảng Điều Khiển Của Thầy Thành)`;
            } else {
                document.getElementById('classTitle').innerText = `Lớp học ${subjectLabel} - Học Sinh: ${currentUser.fullname}`;
            }

            // Bước B: Xóa giao diện 2 nút bấm và dọn dẹp thẻ main để chuẩn bị nhúng Iframe
            const container = document.getElementById('meetContainer');
            container.innerHTML = ''; 
            
            // Bước C: Gọi hàm kích hoạt Jitsi Room tương ứng
            initLiveRoom(roomName);
        }

        // 3. KHỞI TẠO PHÒNG HỌC JITSI DỰA VÀO THAM SỐ TRUYỀN VÀO
        function initLiveRoom(roomName) {
            const domain = "meet.jit.si";
            
            const options = {
                roomName: roomName, // Tự động nhận 'toanthaythanh' hoặc 'tinthaythanh' từ nút bấm
                width: "100%",
                height: "100%",
                parentNode: document.getElementById('meetContainer'),
                userInfo: {
                    displayName: currentUser.fullname
                },
                configOverwrite: {
                    startWithAudioMuted: currentUser.role !== 'admin' && currentUser.role !== 'teacher', 
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false, 
                    disableInviteFunctions: true 
                },
                interfaceConfigOverwrite: {
                    BRAND_APP_NAME: 'Hệ Thống Live Thầy Thành',
                    SHOW_JITSI_WATERMARK: false, 
                    HIDE_DEEP_LINKING_LOGO: true,
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'desktop', 'fullscreen',
                        'factions', 'chat', 'raisehand', 'videoquality', 
                        'tileview', 'participants-pane', 'shareaudio', 'hangup'
                    ]
                }
            };

            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
