<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Học Trực Tuyến - Toán Thầy Thành</title>
    <link class="rounded-full" rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        #meetContainer iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
    </style>
</head>
<body class="bg-slate-900 h-screen flex flex-col overflow-hidden">

    <header class="h-16 bg-slate-950 text-white px-4 border-b border-slate-800 flex justify-between items-center z-50 shadow-md flex-shrink-0">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="w-9 h-9 rounded-full bg-white border border-slate-700">
            <div>
                <h1 id="classTitle" class="text-sm font-black text-slate-200 uppercase tracking-wide">Phòng Học Trực Tuyến</h1>
                <p class="text-[11px] text-emerald-400 font-bold flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Hệ thống Live bảo mật
                </p>
            </div>
        </div>
        <div>
            <a href="trangchu.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-bold text-xs px-4 py-2 rounded-xl transition-all flex items-center gap-1.5 border border-slate-700">
                <i class="fas fa-sign-out-alt"></i> Rời phòng học
            </a>
        </div>
    </header>

    <main id="meetContainer" class="flex-1 w-full bg-slate-950 relative overflow-hidden">
    </main>

    <script>
        // ĐÃ SỬA: Mặc định để null, không tự cấp tài khoản ẩn danh nữa
        let currentUser = null; 

        // KIỂM TRA BẢO MẬT NGAY LẬP TỨC (Chạy trước khi giao diện kịp tải)
        const userStr = localStorage.getItem('user');
        if (!userStr) {
            // Nếu không tìm thấy tài khoản, chặn render và chuyển hướng ngay
            window.stop(); // Dừng tải các tài nguyên khác của trang
            
            // Hiện thông báo cảnh báo bảo mật
            alert("Quyền truy cập bị từ chối! Vui lòng đăng nhập tài khoản học viên để vào phòng.");
            window.location.href = "index.html"; // Thầy đổi thành "dangnhap.html" nếu có file đăng nhập riêng nhé
        } else {
            // Nếu có tài khoản, giải nén dữ liệu chuẩn bị vào lớp
            currentUser = JSON.parse(userStr);
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Thiết lập tiêu đề hiển thị tên chính xác của Thầy hoặc Học sinh
            if (currentUser.role === 'admin' || currentUser.role === 'teacher') {
                document.getElementById('classTitle').innerText = "Lớp Học Trực Tuyến (Bảng Điều Khiển Của Thầy Thành)";
            } else {
                document.getElementById('classTitle').innerText = `Lớp Học Trực Tuyến - Học Sinh: ${currentUser.fullname}`;
            }

            // Kích hoạt gọi Jitsi Room
            initLiveRoom();
        });

        function initLiveRoom() {
            const roomName = "ToanThayThanh_LopHocChinhThuc_Live"; 
            const domain = "meet.jit.si";
            
            const options = {
                roomName: roomName,
                width: "100%",
                height: "100%",
                parentNode: document.getElementById('meetContainer'),
                userInfo: {
                    displayName: currentUser.fullname // Bắt buộc lấy đúng tên trong tài khoản đã đăng ký
                },
                configOverwrite: {
                    startWithAudioMuted: currentUser.role !== 'admin' && currentUser.role !== 'teacher', 
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false, 
                    disableInviteFunctions: true // Ẩn hoàn toàn tính năng copy link mời người ngoài
                },
                interfaceConfigOverwrite: {
                    BRAND_APP_NAME: 'Toán Thầy Thành Live',
                    SHOW_JITSI_WATERMARK: false, 
                    HIDE_DEEP_LINKING_LOGO: true,
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'desktop', 'fullscreen',
                        'factions', 'chat', 'raisehand', 'videoquality', 
                        'tileview', 'participants-pane', 'shareaudio', 'hangup'
                    ]
                }
            };

            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
