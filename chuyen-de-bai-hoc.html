<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nội dung bài học - Toán Thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        /* Cấu trúc đẩy Footer xuống đáy */
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; background-color: #f9fafb; }
        main { flex: 1; }

        /* Dropdown tài khoản */
        .dropdown-user {
            position: absolute; top: 120%; right: 0; width: 220px;
            background: white; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; flex-direction: column; padding: 10px 0;
            z-index: 100; border: 1px solid #f0f0f0;
        }
        .dropdown-user.active { display: flex; }
        .item-dropdown { padding: 12px 20px; font-size: 14px; font-weight: 600; color: #374151; display: flex; align-items: center; text-decoration: none; }
        .item-dropdown:hover { background: #f3f4f6; color: #1e40af; }
        .divider { height: 1px; background: #eee; margin: 5px 0; }
        
        .thanh-menu-ngang { background: #1e3a8a; color: white; }
        .khung-trang { max-width: 1200px; margin: 0 auto; padding: 0 15px; width: 100%; }

        /* Hiệu ứng xoay mũi tên */
        .topic-card.active .icon-chevron { transform: rotate(180deg); }
    </style>
</head>
<body>

    <header class="bg-white shadow-md sticky top-0 z-[1000]">
        <div class="khung-trang flex items-center justify-between py-4">
            <a href="trangchu.html" class="flex items-center gap-2 decoration-none">
                <img src="logo.png" class="w-12 h-12 rounded-full border border-blue-100">
                <div>
                    <div class="text-blue-900 font-black text-xl leading-none uppercase">Toán</div>
                    <div class="text-gray-400 font-bold text-[10px] tracking-widest uppercase">Thầy Thành</div>
                </div>
            </a>
            <div class="cum-tai-khoan relative" id="user-section"></div>
        </div>

        <nav class="thanh-menu-ngang">
            <div class="khung-trang">
                <ul class="flex gap-6 list-none p-0 m-0 py-3">
                    <li><a href="trangchu.html" class="text-white no-underline font-bold text-sm opacity-80 hover:opacity-100">Trang chủ</a></li>
                    <li><a href="khoa-hoc-cua-toi.html" class="text-white no-underline font-bold text-sm border-b-2 border-yellow-400 pb-1">Khóa học của tôi</a></li>
                    <li><a href="#" class="text-white no-underline font-bold text-sm opacity-80 hover:opacity-100">Tài liệu ôn thi</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="khung-trang py-12">
        <div class="mb-10">
            <nav class="flex text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 gap-2">
                <a href="khoa-hoc-cua-toi.html" class="hover:text-blue-900">Khóa học</a> 
                <span>/</span> 
                <span class="text-blue-900">Chuyên đề & Bài học</span>
            </nav>
            <h1 id="course-name" class="text-3xl font-black text-blue-900 uppercase italic tracking-tight">Đang tải...</h1>
        </div>

        <div id="topic-container" class="max-w-4xl space-y-4">
            </div>
    </main>

    <footer class="bg-white border-t py-10 text-center mt-auto">
        <div class="font-black text-blue-900 uppercase text-sm mb-1 tracking-widest">Toán Thầy Thành</div>
        <div class="text-gray-400 text-[10px] font-bold italic">Dạy học từ tâm - Nâng tầm kiến thức</div>
    </footer>

    <script id="user-logged-template" type="text/template">
        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleUserMenu(event)">
            <div class="text-right hidden md:block">
                <div class="text-blue-900 font-black text-sm uppercase leading-tight">{fullname}</div>
                <div class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">{role_text}</div>
            </div>
            <img src="logo.png" class="w-10 h-10 rounded-full border-2 border-blue-900 object-cover">
            <div class="dropdown-user shadow-2xl" id="dropdownUser">
                {admin_option}
                <a href="thong-tin-ca-nhan.html" class="item-dropdown"><i class="fas fa-user-circle mr-3 text-blue-500"></i> Hồ sơ cá nhân</a>
                <a href="khoa-hoc-cua-toi.html" class="item-dropdown text-blue-700 bg-blue-50"><i class="fas fa-book-open mr-3"></i> Khóa học của tôi</a>
                <div class="divider"></div>
                <a href="javascript:void(0)" onclick="logout()" class="item-dropdown text-red-600"><i class="fas fa-sign-out-alt mr-3"></i> Đăng xuất</a>
            </div>
        </div>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');

        function checkLogin() {
            const user = JSON.parse(localStorage.getItem('user'));
            const userSection = document.getElementById('user-section');
            if (user) {
                let template = document.getElementById('user-logged-template').innerHTML;
                let adminOption = user.role === 'admin' ? `<a href="admin.html" class="item-dropdown text-blue-700 bg-blue-50 font-bold">THẦY THÀNH</a><div class="divider"></div>` : '';
                template = template.replace(/{fullname}/g, user.fullname).replace(/{role_text}/g, user.role === 'admin' ? 'Thầy Thành' : 'Học sinh').replace(/{admin_option}/g, adminOption);
                userSection.innerHTML = template;
            } else { window.location.href = 'login.html'; }
        }

        async function loadContent() {
            if (!courseId) return;
            const { data: course } = await supabaseClient.from('courses').select('course_name').eq('id', courseId).single();
            if (course) document.getElementById('course-name').innerText = course.course_name;

            const { data: topics } = await supabaseClient.from('topics').select('*').eq('course_id', courseId).order('id', { ascending: true });
            const { data: lessons } = await supabaseClient.from('lessons').select('*').order('id', { ascending: true });

            const container = document.getElementById('topic-container');
            if (!topics || topics.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 italic py-10">Chưa có bài giảng mới!</p>`;
                return;
            }

            container.innerHTML = topics.map(topic => {
                const topicLessons = lessons.filter(l => l.topic_id === topic.id);
                // CHÚ Ý: bọc topic.id vào dấu nháy đơn '${topic.id}' để không lỗi UUID
                return `
                    <div class="topic-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-4" id="topic-${topic.id}">
                        <div onclick="toggleTopic('${topic.id}')" class="p-5 flex justify-between items-center cursor-pointer hover:bg-blue-50 transition-all">
                            <div class="flex items-center gap-4 pointer-events-none">
                                <div class="w-10 h-10 bg-blue-900 text-white rounded-xl flex items-center justify-center font-black">
                                    <i class="fas fa-layer-group text-xs"></i>
                                </div>
                                <h3 class="font-black text-blue-900 uppercase">${topic.topic_name}</h3>
                            </div>
                            <div class="flex items-center gap-4 pointer-events-none">
                                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase italic">${topicLessons.length} bài học</span>
                                <i class="fas fa-chevron-down text-gray-300 icon-chevron transition-all"></i>
                            </div>
                        </div>
                        
                        <div id="content-${topic.id}" class="border-t border-gray-50 bg-gray-50/30" style="display: none;">
                            ${topicLessons.length > 0 ? topicLessons.map(lesson => `
                                <div onclick="location.href='lesson-detail.html?id=${lesson.id}'" class="p-4 flex items-center justify-between hover:bg-white cursor-pointer transition-all border-b border-gray-50 last:border-0 pl-16 group">
                                    <div class="flex items-center gap-4 pointer-events-none">
                                        <div class="w-8 h-8 rounded-full bg-white border border-gray-100 flex items-center justify-center group-hover:border-blue-500">
                                            <i class="fas fa-play text-[10px] text-gray-300 group-hover:text-blue-500"></i>
                                        </div>
                                        <div>
                                            <div class="text-sm font-bold text-gray-700">${lesson.title}</div>
                                            <div class="text-[10px] text-gray-400 font-medium">${lesson.insight || 'Cùng học với Thầy Thành'}</div>
                                        </div>
                                    </div>
                                    <i class="fas fa-arrow-right text-blue-900 opacity-0 group-hover:opacity-100 mr-4"></i>
                                </div>
                            `).join('') : '<p class="p-4 text-xs text-gray-400 italic pl-16">Chưa có bài giảng!</p>'}
                        </div>
                    </div>`;
            }).join('');
        }

        // HÀM TOGGLE ĐÃ FIX LỖI CLICK
        function toggleTopic(id) {
            const card = document.getElementById('topic-' + id);
            const content = document.getElementById('content-' + id);
            const icon = card.querySelector('.icon-chevron');

            if (content.style.display === 'none') {
                content.style.display = 'block';
                card.classList.add('active');
                if(icon) icon.style.transform = 'rotate(180deg)';
            } else {
                content.style.display = 'none';
                card.classList.remove('active');
                if(icon) icon.style.transform = 'rotate(0deg)';
            }
        }

        function toggleUserMenu(e) { e.stopPropagation(); document.getElementById('dropdownUser')?.classList.toggle('active'); }
        function logout() { if(confirm("Đăng xuất?")) { localStorage.removeItem('user'); window.location.href = 'trangchu.html'; } }
        
        window.onload = () => { checkLogin(); loadContent(); };
        window.onclick = (e) => { if (!e.target.closest('.cum-tai-khoan')) document.getElementById('dropdownUser')?.classList.remove('active'); };
    </script>
</body>
</html>
