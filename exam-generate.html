                    <div class="flex items-center gap-3"><i class="fas fa-graduation-cap w-5 text-blue-300"></i> Quản lý thi Online</div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 px-8 flex justify-between items-center border-b">
            <h2 class="text-xl font-black text-blue-900 uppercase italic">Hệ thống tạo đề tự động</h2>
            <div class="flex gap-2">
                <button onclick="previewExam()" class="bg-gray-100 text-blue-900 px-5 py-2 rounded-xl font-bold text-sm hover:bg-gray-200 transition-all uppercase">
                    <i class="fas fa-eye mr-2"></i> Xem đề
                </button>
                <button onclick="saveExam()" class="bg-blue-900 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-blue-800 shadow-lg transition-all uppercase">
                    <i class="fas fa-save mr-2"></i> Lưu đề
                </button>
                <button onclick="exportToWord()" class="bg-blue-500 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-blue-600 shadow-lg transition-all uppercase">
                    <i class="fas fa-file-word mr-2"></i> Xuất Word
                </button>
            </div>
        </header>

        <div class="p-8 flex-1 overflow-y-auto bg-gray-50 custom-scrollbar">
            <div class="max-w-5xl mx-auto space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-[30px] border border-gray-100 shadow-sm">
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-widest mb-2 block italic">Tên đề thi</label>
                        <input id="exam-title" type="text" placeholder="Nhập tên đề..." class="w-full p-3 bg-gray-50 border rounded-2xl font-bold outline-none focus:border-blue-900 italic">
                    </div>
                    <div class="bg-white p-6 rounded-[30px] border border-gray-100 shadow-sm">
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-widest mb-2 block italic">Khóa học mục tiêu</label>
                        <select id="course-selector" onchange="filterTopicsByCourse(this.value)" class="w-full p-3 bg-blue-50 border-none rounded-2xl font-bold text-blue-900 outline-none">
                            <option value="">-- Chọn khóa học --</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-between items-center px-4">
                    <h3 class="text-sm font-black text-blue-900 uppercase italic tracking-widest">Cấu trúc 5 câu hỏi (Nhiều ý)</h3>
                    <button onclick="randomAll()" class="text-blue-600 hover:text-blue-900 font-bold text-xs uppercase italic">
                        <i class="fas fa-sync-alt mr-1"></i> Trộn nhanh tất cả
                    </button>
                </div>

                <div id="questions-container" class="space-y-4 pb-10">
                    </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let allTopics = [];
        let examQuestions = Array(8).fill(null); 

        async function init() {
            // Load khóa học
            const { data: courses } = await supabaseClient.from('courses').select('id, course_name').order('course_name');
            const { data: topics } = await supabaseClient.from('topics').select('*').order('order_index');
            allTopics = topics || [];
            
            const sel = document.getElementById('course-selector');
            (courses || []).forEach(c => sel.innerHTML += `<option value="${c.id}">${c.course_name}</option>`);
            
            // Khởi tạo cấu trúc bảng chọn ngay từ đầu
            renderStructure();
        }

        function renderStructure() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            // Cấu hình: Câu 1 (Slot 0,1), Câu 2 (Slot 2), Câu 3 (Slot 3,4,5), Câu 4 (Slot 6), Câu 5 (Slot 7)
            const structure = [
                { label: 'CÂU 1 (Ý 1)', index: 0 }, { label: 'CÂU 1 (Ý 2)', index: 1 },
                { label: 'CÂU 2', index: 2 },
                { label: 'CÂU 3 (Ý 1)', index: 3 }, { label: 'CÂU 3 (Ý 2)', index: 4 }, { label: 'CÂU 3 (Ý 3)', index: 5 },
                { label: 'CÂU 4', index: 6 },
                { label: 'CÂU 5', index: 7 }
            ];

            structure.forEach(item => {
                container.innerHTML += `
                    <div class="question-card bg-white p-5 rounded-[25px] border border-gray-100 shadow-sm flex flex-col md:flex-row gap-4 items-center">
                        <div class="w-28 text-blue-900 font-black italic text-xs uppercase shrink-0">${item.label}</div>
                        <div class="w-full md:w-64">
                            <select onchange="randomQuestion(${item.index}, this.value)" class="topic-select w-full p-3 bg-gray-50 border rounded-xl font-bold text-xs outline-none focus:border-blue-500">
                                <option value="">-- Chọn chuyên đề --</option>
                            </select>
                        </div>
                        <div id="preview-${item.index}" class="flex-1 p-3 bg-gray-50 rounded-xl text-[10px] text-gray-400 italic min-h-[50px] border border-dashed flex flex-col justify-center">
                            Chưa chọn chuyên đề...
                        </div>
                        <button onclick="refreshOne(${item.index})" class="w-10 h-10 rounded-full bg-blue-50 text-blue-900 hover:bg-blue-900 hover:text-white transition-all flex items-center justify-center shrink-0">
                            <i class="fas fa-dice"></i>
                        </button>
                    </div>`;
            });
            // Cập nhật lại danh sách chuyên đề nếu đã chọn khóa học trước đó
            const currentCourseId = document.getElementById('course-selector').value;
            if(currentCourseId) filterTopicsByCourse(currentCourseId);
        }

        function filterTopicsByCourse(courseId) {
            const filtered = allTopics.filter(t => t.course_id === courseId);
            const selects = document.querySelectorAll('.topic-select');
            selects.forEach(s => {
                const currentVal = s.value;
                s.innerHTML = '<option value="">-- Chọn chuyên đề --</option>' + 
                    filtered.map(t => `<option value="${t.id}">${t.topic_name}</option>`).join('');
                s.value = currentVal; // Giữ lại giá trị nếu có
            });
        }

        async function randomQuestion(index, topicId) {
            if (!topicId) return;
            const previewBox = document.getElementById(`preview-${index}`);
            previewBox.innerHTML = 'Đang trộn...';

            const { data } = await supabaseClient.from('questions')
                .select('*')
                .eq('topic_id', topicId)
                .eq('question_type', 'essay');

            if (data && data.length > 0) {
                const q = data[Math.floor(Math.random() * data.length)];
                examQuestions[index] = q;
                let img = q.image_url ? `<img src="${q.image_url}" class="preview-img">` : '';
                previewBox.innerHTML = `<div class="font-bold text-blue-900 line-clamp-1">${q.content}</div>${img}`;
                if (window.MathJax) MathJax.typesetPromise();
            } else {
                previewBox.innerHTML = '<span class="text-red-400">Không có câu hỏi!</span>';
                examQuestions[index] = null;
            }
        }

        function refreshOne(index) {
            const tid = document.querySelectorAll('.topic-select')[index].value;
            if(tid) randomQuestion(index, tid);
        }

        function randomAll() {
            const selects = document.querySelectorAll('.topic-select');
            selects.forEach((s, i) => { if(s.value) randomQuestion(i, s.value); });
        }

        function previewExam() {
            let html = `<div class="text-left space-y-6 max-h-[70vh] overflow-y-auto p-4 custom-scrollbar">`;
            const groups = [
                { label: 'CÂU 1', slots: [0, 1] }, { label: 'CÂU 2', slots: [2] },
                { label: 'CÂU 3', slots: [3, 4, 5] }, { label: 'CÂU 4', slots: [6] }, { label: 'CÂU 5', slots: [7] }
            ];

            groups.forEach(g => {
                html += `<div class="border-b pb-4"><p class="font-black text-blue-900 mb-2 uppercase">${g.label}:</p>`;
                g.slots.forEach((s, idx) => {
                    const q = examQuestions[s];
                    if (q) {
                        let prefix = g.slots.length > 1 ? `<i>Ý ${idx+1}: </i>` : '';
                        let img = q.image_url ? `<img src="${q.image_url}" class="block my-2 max-w-xs border">` : '';
                        html += `<div class="ml-4 mb-3 text-sm">${prefix}${q.content}${img}</div>`;
                    }
                });
                html += `</div>`;
            });
            html += `</div>`;
            Swal.fire({ title: 'XEM TRƯỚC ĐỀ THI', html: html, width: '850px', didOpen: () => { if(window.MathJax) MathJax.typesetPromise(); }});
        }

        async function exportToWord() {
            const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType } = docx;
            const title = document.getElementById('exam-title').value || "DE_THI";
            const children = [
                new Paragraph({ children: [new TextRun({ text: "TOÁN THẦY THÀNH", bold: true, size: 28 })], alignment: AlignmentType.CENTER }),
                new Paragraph({ children: [new TextRun({ text: title.toUpperCase(), bold: true, size: 24 })], alignment: AlignmentType.CENTER, spacing: { after: 400 } })
            ];

            const groups = [
                { l: 'CÂU 1', s: [0, 1] }, { l: 'CÂU 2', s: [2] }, { l: 'CÂU 3', s: [3, 4, 5] }, { l: 'CÂU 4', s: [6] }, { l: 'CÂU 5', s: [7] }
            ];

            for (const g of groups) {
                children.push(new Paragraph({ children: [new TextRun({ text: `${g.l}:`, bold: true, size: 24 })], spacing: { before: 200, after: 100 } }));
                for (let i = 0; i < g.s.length; i++) {
                    const q = examQuestions[g.s[i]];
                    if (!q) continue;
                    let txt = g.s.length > 1 ? `Ý ${i+1}: ${q.content}` : q.content;
                    children.push(new Paragraph({ children: [new TextRun({ text: txt, size: 24 })], indent: { left: 720 }, spacing: { after: 100 } }));
                    if (q.image_url) {
                        try {
                            const res = await fetch(q.image_url);
                            const buf = await (await res.blob()).arrayBuffer();
                            children.push(new Paragraph({ children: [new ImageRun({ data: buf, transformation: { width: 320, height: 160 } })], indent: { left: 720 } }));
                        } catch (e) {}
                    }
                }
            }

            const doc = new Document({ sections: [{ children }] });
            Packer.toBlob(doc).then(blob => { saveAs(blob, `${title}.docx`); Swal.fire('Thành công', 'Đã tải file Word!', 'success'); });
        }

        async function saveExam() {
            const title = document.getElementById('exam-title').value;
            const cid = document.getElementById('course-selector').value;
            if(!title || !cid) return Swal.fire('Lỗi', 'Thầy nhập đủ thông tin!', 'error');
            const { data: ex } = await supabaseClient.from('exams').insert([{ title, course_id: cid }]).select().single();
            if(ex) {
                const rels = examQuestions.filter(q => q).map((q, idx) => ({ exam_id: ex.id, question_id: q.id, order_index: idx+1 }));
                await supabaseClient.from('exam_questions').insert(rels);
                Swal.fire('Thành công', 'Đã lưu đề!', 'success');
            }
        }

        function toggleSubmenu(id, el) {
            document.getElementById(id).classList.toggle('show');
            el.querySelector('.arrow-icon').classList.toggle('rotate-180');
        }

        init();
    </script>
</body>
