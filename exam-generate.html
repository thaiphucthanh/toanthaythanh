<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo đề tích hợp - Toán thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-item { cursor: pointer; transition: all 0.3s; border-radius: 15px; margin: 0 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .submenu { display: none; flex-direction: column; background: rgba(0,0,0,0.2); }
        .submenu.show { display: flex; margin-top: 5px; }
        .rotate-180 { transform: rotate(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .question-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .question-card:hover { border-color: #1e3a8a; transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
        .preview-img { max-width: 200px; display: block; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-blue-900 text-white flex flex-col shadow-xl z-50">
        <div class="p-6 flex items-center gap-3 border-b border-blue-800">
            <a href="admin.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img src="logo.png" class="w-12 h-12 rounded-full bg-white p-1" onerror="this.src='https://ui-avatars.com/api/?name=TT&background=fff&color=1e3a8a'">
                <div>
                    <div class="font-black text-lg leading-tight uppercase italic">TOÁN</div>
                    <div class="text-xs text-blue-200 uppercase tracking-widest text-[10px]">Thầy Thành Cổng Admin</div>
                </div>
            </a>
        </div>
        <nav class="flex-1 mt-4 overflow-y-auto custom-scrollbar">
            <a href="admin.html" class="sidebar-item p-4 flex items-center gap-3 mb-1 font-bold">
                <i class="fas fa-home w-5"></i> Trang Welcome
            </a>
            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between font-bold" onclick="toggleSubmenu('exam-menu', this)">
                    <div class="flex items-center gap-3"><i class="fas fa-graduation-cap w-5 text-blue-300"></i> Quản lý thi</div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform rotate-180"></i>
                </div>
                <div id="exam-menu" class="submenu show">
                    <a href="exam-generate.html" class="block py-3 pl-12 text-sm text-yellow-400 font-bold border-l-4 border-yellow-400 bg-blue-800/50 italic">Trộn đề tích hợp</a>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 px-8 flex justify-between items-center border-b">
            <h2 class="text-xl font-black text-blue-900 uppercase italic">Trộn đề tự luận nhiều ý</h2>
            <div class="flex gap-2">
                <button onclick="previewExam()" class="bg-gray-100 text-blue-900 px-5 py-2 rounded-xl font-bold text-sm hover:bg-gray-200 transition-all">
                    <i class="fas fa-eye mr-2"></i> Xem đề
                </button>
                <button onclick="saveExam()" class="bg-blue-900 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-blue-800 shadow-lg">
                    <i class="fas fa-save mr-2"></i> Lưu đề
                </button>
                <button onclick="exportToWord()" class="bg-blue-500 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-blue-600 shadow-lg">
                    <i class="fas fa-file-word mr-2"></i> Tải Word (.docx)
                </button>
            </div>
        </header>

        <div class="p-8 flex-1 overflow-y-auto bg-gray-50 custom-scrollbar">
            <div class="max-w-5xl mx-auto space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-[30px] border border-gray-100 shadow-sm">
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-widest mb-1 block italic">Tên đề thi</label>
                        <input id="exam-title" type="text" placeholder="VD: Đề thi thử vào 10..." class="w-full p-3 bg-gray-50 border rounded-2xl font-bold outline-none focus:border-blue-900 italic">
                    </div>
                    <div class="bg-white p-6 rounded-[30px] border border-gray-100 shadow-sm">
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-widest mb-1 block italic">Khóa học</label>
                        <select id="course-selector" onchange="filterTopicsByCourse(this.value)" class="w-full p-3 bg-blue-50 border-none rounded-2xl font-bold text-blue-900 outline-none">
                            <option value="">-- Chọn khóa học --</option>
                        </select>
                    </div>
                </div>

                <div id="questions-container" class="space-y-4 pb-10">
                    </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let allTopics = [];
        // examQuestions sẽ chứa danh sách các câu hỏi theo từng slot
        // Slot 0,1: Câu 1. Slot 2: Câu 2. Slot 3,4,5: Câu 3. Slot 6: Câu 4. Slot 7: Câu 5.
        let examQuestions = Array(8).fill(null);

        async function init() {
            const { data: courses } = await supabaseClient.from('courses').select('id, course_name').order('course_name');
            const { data: topics } = await supabaseClient.from('topics').select('*').order('order_index');
            allTopics = topics || [];
            
            const sel = document.getElementById('course-selector');
            (courses || []).forEach(c => sel.innerHTML += `<option value="${c.id}">${c.course_name}</option>`);
            
            renderStructure();
        }

        function filterTopicsByCourse(courseId) {
            const filtered = allTopics.filter(t => t.course_id === courseId);
            document.querySelectorAll('.topic-select').forEach(s => {
                s.innerHTML = '<option value="">-- Chọn chuyên đề --</option>' + 
                    filtered.map(t => `<option value="${t.id}">${t.topic_name}</option>`).join('');
            });
        }

        function renderStructure() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            // Cấu hình số ý cho từng câu: Câu 1 (2 ý), Câu 2 (1 ý), Câu 3 (3 ý), Câu 4 (1 ý), Câu 5 (1 ý)
            const structure = [
                { label: 'Câu 1 (Ý 1)', index: 0 },
                { label: 'Câu 1 (Ý 2)', index: 1 },
                { label: 'Câu 2', index: 2 },
                { label: 'Câu 3 (Ý 1)', index: 3 },
                { label: 'Câu 3 (Ý 2)', index: 4 },
                { label: 'Câu 3 (Ý 3)', index: 5 },
                { label: 'Câu 4', index: 6 },
                { label: 'Câu 5', index: 7 }
            ];

            structure.forEach(item => {
                container.innerHTML += `
                    <div class="question-card bg-white p-4 rounded-[25px] border border-gray-100 shadow-sm flex flex-col md:flex-row gap-4 items-center">
                        <div class="w-24 text-blue-900 font-black italic text-xs uppercase shrink-0">${item.label}</div>
                        <div class="w-full md:w-64">
                            <select onchange="randomQuestion(${item.index}, this.value)" class="topic-select w-full p-3 bg-gray-50 border rounded-xl font-bold text-xs outline-none focus:border-blue-500">
                                <option value="">-- Chọn chuyên đề --</option>
                            </select>
                        </div>
                        <div id="preview-${item.index}" class="flex-1 p-3 bg-gray-50 rounded-xl text-[10px] text-gray-500 italic min-h-[50px] border border-dashed flex flex-col justify-center">
                            Đang chờ...
                        </div>
                        <button onclick="refreshOne(${item.index})" class="w-10 h-10 rounded-full bg-blue-50 text-blue-900 hover:bg-blue-900 hover:text-white transition-all flex items-center justify-center shrink-0 shadow-sm">
                            <i class="fas fa-dice"></i>
                        </button>
                    </div>`;
            });
        }

        async function randomQuestion(index, topicId) {
            if (!topicId) return;
            const previewBox = document.getElementById(`preview-${index}`);
            previewBox.innerHTML = 'Đang lấy dữ liệu...';

            const { data } = await supabaseClient.from('questions')
                .select('*')
                .eq('topic_id', topicId)
                .eq('question_type', 'essay');

            if (data && data.length > 0) {
                const q = data[Math.floor(Math.random() * data.length)];
                examQuestions[index] = q;
                
                let imgHtml = q.image_url ? `<img src="${q.image_url}" class="preview-img">` : '';
                previewBox.innerHTML = `<div class="font-bold text-blue-900 line-clamp-1">${q.content}</div>${imgHtml}`;
                if (window.MathJax) MathJax.typesetPromise();
            } else {
                previewBox.innerHTML = '<span class="text-red-400">Không có câu tự luận!</span>';
                examQuestions[index] = null;
            }
        }

        function refreshOne(index) {
            const tid = document.querySelectorAll('.topic-select')[index].value;
            if(tid) randomQuestion(index, tid);
        }

        function previewExam() {
            let html = `<div class="text-left space-y-6 max-h-[70vh] overflow-y-auto p-4 custom-scrollbar">`;
            
            // Xử lý gom nhóm hiển thị: Câu 1 (Slot 0,1), v.v.
            const displayGroups = [
                { label: 'CÂU 1', slots: [0, 1] },
                { label: 'CÂU 2', slots: [2] },
                { label: 'CÂU 3', slots: [3, 4, 5] },
                { label: 'CÂU 4', slots: [6] },
                { label: 'CÂU 5', slots: [7] }
            ];

            displayGroups.forEach(group => {
                html += `<div class="border-b pb-4"><p class="font-black text-blue-900 uppercase italic mb-2">${group.label}:</p>`;
                group.slots.forEach((slot, subIdx) => {
                    const q = examQuestions[slot];
                    if (q) {
                        let prefix = group.slots.length > 1 ? `<i>Ý ${subIdx + 1}:</i> ` : '';
                        let img = q.image_url ? `<div class="my-2"><img src="${q.image_url}" class="max-w-xs rounded border"></div>` : '';
                        html += `<div class="ml-4 mb-3 text-sm">${prefix}${q.content}${img}</div>`;
                    }
                });
                html += `</div>`;
            });

            html += `</div>`;

            Swal.fire({
                title: 'BẢN XEM TRƯỚC ĐỀ THI',
                html: html,
                width: '900px',
                confirmButtonColor: '#1e3a8a',
                didOpen: () => { if (window.MathJax) MathJax.typesetPromise(); }
            });
        }

        // HÀM XUẤT FILE WORD (.DOCX) KÈM ẢNH
        async function exportToWord() {
            const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType } = docx;
            const title = document.getElementById('exam-title').value || "DE_THI_TS_VAO_10";

            const sections = [];
            
            // Tiêu đề đề thi
            sections.push(new Paragraph({
                children: [new TextRun({ text: "TOÁN THẦY THÀNH", bold: true, size: 28 })],
                alignment: AlignmentType.CENTER,
            }));
            sections.push(new Paragraph({
                children: [new TextRun({ text: title.toUpperCase(), bold: true, size: 24 })],
                alignment: AlignmentType.CENTER,
                spacing: { after: 400 },
            }));

            const groups = [
                { label: 'Câu 1', slots: [0, 1] },
                { label: 'Câu 2', slots: [2] },
                { label: 'Câu 3', slots: [3, 4, 5] },
                { label: 'Câu 4', slots: [6] },
                { label: 'Câu 5', slots: [7] }
            ];

            for (const group of groups) {
                sections.push(new Paragraph({
                    children: [new TextRun({ text: `${group.label.toUpperCase()}:`, bold: true, size: 24 })],
                    spacing: { before: 200, after: 100 },
                }));

                for (let i = 0; i < group.slots.length; i++) {
                    const q = examQuestions[group.slots[i]];
                    if (!q) continue;

                    let qText = group.slots.length > 1 ? `Ý ${i + 1}: ${q.content}` : q.content;
                    
                    sections.push(new Paragraph({
                        children: [new TextRun({ text: qText, size: 24 })],
                        indent: { left: 720 },
                        spacing: { after: 100 },
                    }));

                    // Xử lý chèn ảnh vào Word
                    if (q.image_url) {
                        try {
                            const response = await fetch(q.image_url);
                            const blob = await response.blob();
                            const arrayBuffer = await blob.arrayBuffer();

                            sections.push(new Paragraph({
                                children: [
                                    new ImageRun({
                                        data: arrayBuffer,
                                        transformation: { width: 300, height: 150 },
                                    }),
                                ],
                                indent: { left: 720 },
                                spacing: { after: 200 },
                            }));
                        } catch (e) { console.error("Lỗi tải ảnh cho Word", e); }
                    }
                }
            }

            const doc = new Document({
                sections: [{ properties: {}, children: sections }],
            });

            Packer.toBlob(doc).then((blob) => {
                saveAs(blob, `${title}.docx`);
                Swal.fire('Thành công', 'Đã tải file Word về máy thầy!', 'success');
            });
        }

        async function saveExam() {
            const title = document.getElementById('exam-title').value;
            const cid = document.getElementById('course-selector').value;
            if(!title || !cid) return Swal.fire('Lỗi', 'Thầy nhập đủ thông tin nhé!', 'error');

            const { data: ex } = await supabaseClient.from('exams').insert([{ title, course_id: cid, status: 'complex' }]).select().single();
            if(ex) {
                const rels = examQuestions.filter(q => q).map((q, idx) => ({
                    exam_id: ex.id, question_id: q.id, order_index: idx + 1
                }));
                await supabaseClient.from('exam_questions').insert(rels);
                Swal.fire('Xong!', 'Đề thi đã được lưu hệ thống!', 'success');
            }
        }

        function toggleSubmenu(id, el) {
            document.getElementById(id).classList.toggle('show');
            el.querySelector('.arrow-icon').classList.toggle('rotate-180');
        }

        init();
    </script>
</body>
</html>
