<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách học viên - HDC Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        .sidebar-item { cursor: pointer; transition: all 0.3s; border-radius: 15px; margin: 0 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .submenu { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .submenu.show { max-height: 500px; margin-top: 5px; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-blue-900 text-white flex flex-col shadow-xl z-50">
        <div class="p-6 flex items-center gap-3 border-b border-blue-800">
            <a href="admin.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img src="logo.png" class="w-12 h-12 rounded-full bg-white p-1">
                <div>
                    <div class="font-black text-lg leading-tight text-white">TOÁN</div>
                    <div class="text-xs text-blue-200 uppercase tracking-widest text-[10px]">Thầy Thành Cổng Admin</div>
                </div>
            </a>
        </div>

        <nav class="flex-1 mt-4 overflow-y-auto custom-scrollbar">
            <a href="admin.html" class="sidebar-item p-4 flex items-center gap-3 mb-1">
                <i class="fas fa-home w-5 text-blue-300"></i>
                <span class="font-bold">Trang Welcome</span>
            </a>

            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('user-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-users w-5 text-blue-300"></i>
                        <span class="font-bold">Quản lý người dùng</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform rotate-180"></i>
                </div>
                <div id="user-menu" class="submenu show">
                    <a href="user-list.html" class="block py-3 pl-12 text-sm text-yellow-400 font-bold border-l-4 border-yellow-400 bg-blue-800/50">
                        <i class="fas fa-list-ul mr-2"></i> Danh sách người dùng
                    </a>
                    <a href="add-user.html" class="block py-3 pl-12 text-sm hover:text-yellow-400">
                        <i class="fas fa-user-plus mr-2"></i> Thêm mới
                    </a>
                </div>
            </div>

            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('course-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-book w-5 text-blue-300"></i>
                        <span class="font-bold">Quản lý khóa học</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform"></i>
                </div>
                <div id="course-menu" class="submenu">
                    <a href="course-list.html" class="block py-3 pl-12 text-sm hover:text-yellow-400 transition-colors">Danh sách khóa học</a>
                    <a href="add-course.html" class="block py-3 pl-12 text-sm hover:text-yellow-400 transition-colors">Thêm khóa học mới</a>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 px-8 flex justify-between items-center border-b text-blue-900">
            <h2 class="text-xl font-black uppercase tracking-tight">Quản lý người dùng</h2>
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold">Chào Thầy Thành</span>
                <img src="logo.png" class="w-10 h-10 rounded-full border border-blue-900 p-0.5">
            </div>
        </header>

        <div class="p-8 flex-1 overflow-y-auto bg-gray-50 custom-scrollbar">
            <div class="bg-white rounded-[30px] shadow-sm border border-gray-100 overflow-hidden">
                
                <div class="p-6 border-b border-gray-50 flex flex-wrap gap-4 justify-between items-center">
                    <div class="relative w-full md:w-96">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-input" placeholder="Tìm tên, email, sdt..." 
                               class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium text-sm">
                    </div>
                    
                    <div class="flex gap-2">
                        <button onclick="fetchUsers()" class="p-3 px-5 bg-blue-50 text-blue-600 rounded-2xl hover:bg-blue-100 transition-all font-bold flex items-center gap-2 text-sm">
                            <i class="fas fa-sync-alt" id="refresh-icon"></i>
                            <span>Tải lại dữ liệu</span>
                        </button>
                        <a href="add-user.html" class="p-3 px-6 bg-blue-900 text-white rounded-2xl hover:bg-blue-800 transition-all font-bold flex items-center gap-2 shadow-lg shadow-blue-900/20 text-sm">
                            <i class="fas fa-plus text-xs"></i>
                            <span>Thêm mới</span>
                        </a>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50 border-b border-gray-100">
                                <th class="p-5 text-[10px] font-black text-blue-900 uppercase tracking-widest pl-8">Học viên / Email</th>
                                <th class="p-5 text-[10px] font-black text-blue-900 uppercase tracking-widest">SĐT / Facebook</th>
                                <th class="p-5 text-[10px] font-black text-blue-900 uppercase tracking-widest">Vai trò</th>
                                <th class="p-5 text-[10px] font-black text-blue-900 uppercase tracking-widest text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body" class="divide-y divide-gray-50">
                            </tbody>
                    </table>
                </div>

                <div id="loading" class="p-20 text-center">
                    <i class="fas fa-circle-notch animate-spin text-4xl text-blue-900"></i>
                    <p class="mt-4 text-gray-400 font-medium text-sm italic">Đang cập nhật danh sách từ HDC Study...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rznyagxrshwwocsvrabe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allUsers = [];

        async function fetchUsers() {
            const icon = document.getElementById('refresh-icon');
            const loading = document.getElementById('loading');
            const tbody = document.getElementById('user-table-body');
            
            icon.classList.add('animate-spin');
            loading.classList.remove('hidden');
            tbody.innerHTML = '';

            const { data, error } = await supabaseClient
                .from('accounts')
                .select('*')
                .order('created_at', { ascending: false });

            icon.classList.remove('animate-spin');
            loading.classList.add('hidden');

            if (error) { alert('Lỗi: ' + error.message); return; }
            allUsers = data;
            renderTable(allUsers);
        }

        function renderTable(users) {
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = users.map(user => `
                <tr class="hover:bg-blue-50/20 transition-colors">
                    <td class="p-5 pl-8">
                        <div class="font-bold text-blue-900">${user.fullname}</div>
                        <div class="text-[11px] text-gray-400 font-medium">${user.email}</div>
                    </td>
                    <td class="p-5">
                        <div class="text-xs font-bold text-gray-600">${user.sdt || '---'}</div>
                        ${user.link_fb ? `<a href="${user.link_fb}" target="_blank" class="text-blue-500 text-[10px] font-bold hover:underline">Facebook <i class="fas fa-external-link-alt ml-1"></i></a>` : ''}
                    </td>
                    <td class="p-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${getRoleClass(user.role)}">
                            ${translateRole(user.role)}
                        </span>
                    </td>
                    <td class="p-5">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="toggleStatus('${user.id}', '${user.status}')" 
                                    class="p-2 rounded-xl transition-all ${user.status === 'active' ? 'bg-green-50 text-green-600 hover:bg-green-100' : 'bg-red-50 text-red-600 hover:bg-red-100'}"
                                    title="${user.status === 'active' ? 'Đang hoạt động - Bấm để khóa' : 'Đang khóa - Bấm để mở'}">
                                <i class="fas ${user.status === 'active' ? 'fa-toggle-on' : 'fa-toggle-off'} text-lg"></i>
                            </button>

                            <button onclick="editUser('${user.id}')" 
                                    class="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-all" title="Chỉnh sửa">
                                <i class="fas fa-user-edit"></i>
                            </button>

                            <button onclick="deleteUser('${user.id}')" 
                                    class="p-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-all" title="Xóa tài khoản">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function translateRole(role) {
            const roles = { 'admin': 'Quản trị', 'student': 'Học sinh', 'teacher': 'Giáo viên' };
            return roles[role] || role;
        }

        function getRoleClass(role) {
            if (role === 'admin') return 'bg-purple-100 text-purple-700';
            if (role === 'teacher') return 'bg-blue-100 text-blue-700';
            return 'bg-gray-100 text-gray-600';
        }

        // TÌM KIẾM
        document.getElementById('search-input').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.fullname.toLowerCase().includes(kw) || 
                u.email.toLowerCase().includes(kw) || 
                (u.sdt && u.sdt.includes(kw))
            );
            renderTable(filtered);
        });

        // BẬT TẮT TRẠNG THÁI
        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
            const { error } = await supabaseClient.from('accounts').update({ status: newStatus }).eq('id', id);
            if (error) alert('Lỗi: ' + error.message);
            else fetchUsers();
        }

        // CHỈNH SỬA (Sẽ chuyển hướng sang trang edit hoặc hiện modal)
        function editUser(id) {
            alert('Thầy Thành muốn chỉnh sửa User ID: ' + id + '\n(Tính năng chuyển trang edit đang cập nhật)');
        }

        // XÓA
        async function deleteUser(id) {
            if(confirm('Thầy có chắc chắn muốn xóa vĩnh viễn tài khoản này?')) {
                const { error } = await supabaseClient.from('accounts').delete().eq('id', id);
                if (error) alert('Lỗi: ' + error.message);
                else fetchUsers();
            }
        }

        function toggleSubmenu(id, element) {
            const menu = document.getElementById(id);
            const arrow = element.querySelector('.arrow-icon');
            menu.classList.toggle('show');
            if (arrow) arrow.classList.toggle('rotate-180');
        }

        fetchUsers();
    </script>
</body>
</html>
