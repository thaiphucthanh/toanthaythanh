<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - Toán Thầy Thành</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f9fafb; }
        #main-content { display: block; } /* Để block để thầy debug */
    </style>
</head>
<body>

    <main id="main-content" class="py-10">
      <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-black text-blue-900 mb-6 uppercase">Thông tin cá nhân</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase">Họ và tên</label>
                <input type="text" id="profile-name" class="w-full p-3 bg-gray-50 rounded-xl border-none font-bold text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase">Số điện thoại</label>
                <input type="text" id="profile-sdt" class="w-full p-3 bg-gray-50 rounded-xl border-none font-bold text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase">Email (đăng nhập)</label>
                <input type="email" id="profile-email" disabled class="w-full p-3 bg-gray-100 rounded-xl border-none font-bold text-sm text-gray-400 cursor-not-allowed">
            </div>
            <button onclick="updateProfile()" class="w-full py-3 bg-blue-900 text-white rounded-xl font-bold text-sm hover:bg-blue-800 transition">Lưu thông tin</button>
        </div>
      </div>
    </main>

    <script>
        const SB_URL = "https://rznyagxrshwwocsvrabe.supabase.co";
        const SB_KEY = "sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function checkAndLoad() {
            // 1. Lấy session hiện tại
            const { data: { session }, error } = await sb.auth.getSession();
            
            if (error || !session) {
                console.error("Không tìm thấy phiên đăng nhập:", error);
                alert("Bạn chưa đăng nhập hoặc phiên đã hết hạn. Vui lòng đăng nhập lại.");
                // window.location.href = 'login.html'; // Tạm thời comment dòng này lại để thầy không bị đá ra
                return;
            }

            console.log("Đã đăng nhập với user:", session.user.email);
            loadProfile(session.user);
        }

        async function loadProfile(user) {
            // 2. Load dữ liệu từ bảng accounts
            const { data, error } = await sb.from('accounts').select('*').eq('id', user.id).single();
            
            if (error) {
                console.error("Lỗi khi load profile từ bảng accounts:", error);
                alert("Lỗi khi tải thông tin: " + error.message);
                return;
            }

            if (data) {
                document.getElementById('profile-name').value = data.fullname || '';
                document.getElementById('profile-sdt').value = data.sdt || '';
                document.getElementById('profile-email').value = user.email || '';
            }
        }

        async function updateProfile() {
            const { data: { user } } = await sb.auth.getUser();
            const newName = document.getElementById('profile-name').value;
            const newSdt = document.getElementById('profile-sdt').value;

            const { error } = await sb.from('accounts')
                .update({ fullname: newName, sdt: newSdt })
                .eq('id', user.id);

            if (error) Swal.fire('Lỗi', error.message, 'error');
            else Swal.fire('Thành công', 'Đã lưu thông tin!', 'success');
        }

        // Chạy ngay khi load
        checkAndLoad();
    </script>
</body>
</html>
