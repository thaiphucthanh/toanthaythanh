<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm người dùng mới - Admin HDC Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-item { cursor: pointer; transition: all 0.3s; border-radius: 15px; margin: 0 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .submenu { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0,0,0,0.2); }
        .submenu.show { max-height: 500px; margin-top: 5px; }
        .rotate-180 { transform: rotate(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-72 bg-blue-900 text-white flex flex-col shadow-xl z-50">
        <div class="p-6 flex items-center gap-3 border-b border-blue-800">
            <a href="admin.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img src="logo.png" class="w-12 h-12 rounded-full bg-white p-1">
                <div>
                    <div class="font-black text-lg leading-tight text-white">TOÁN</div>
                    <div class="text-xs text-blue-200 uppercase tracking-widest text-[10px]">Thầy Thành Cổng Admin</div>
                </div>
            </a>
        </div>

        <nav class="flex-1 mt-4 overflow-y-auto custom-scrollbar">
            <a href="admin.html" class="sidebar-item p-4 flex items-center gap-3 mb-1">
                <i class="fas fa-home w-5 text-blue-300"></i>
                <span class="font-bold">Trang Welcome</span>
            </a>

            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('user-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-users w-5 text-blue-300"></i>
                        <span class="font-bold">Quản lý người dùng</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform rotate-180"></i>
                </div>
                <div id="user-menu" class="submenu show">
                    <a href="user-list.html" class="block py-3 pl-12 text-sm hover:text-yellow-400">
                        <i class="fas fa-list-ul mr-2"></i> Danh sách người dùng
                    </a>
                    <a href="add-user.html" class="block py-3 pl-12 text-sm text-yellow-400 font-bold border-l-4 border-yellow-400 bg-blue-800/50">
                        <i class="fas fa-user-plus mr-2"></i> Thêm mới
                    </a>
                </div>
            </div>

            <div class="menu-parent">
                <div class="sidebar-item p-4 flex items-center justify-between" onclick="toggleSubmenu('course-menu', this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-book w-5 text-blue-300"></i>
                        <span class="font-bold">Quản lý khóa học</span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] arrow-icon transition-transform"></i>
                </div>
                <div id="course-menu" class="submenu">
                    <a href="course-list.html" class="block py-3 pl-12 text-sm hover:text-yellow-400">Danh sách khóa học</a>
                    <a href="add-course.html" class="block py-3 pl-12 text-sm hover:text-yellow-400">Thêm khóa học mới</a>
                </div>
            </div>

            <a href="exam.html" class="sidebar-item p-4 flex items-center gap-3 mt-1">
                <i class="fas fa-edit w-5 text-blue-300"></i>
                <span class="font-bold">Thi Online</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 px-8 flex justify-between items-center border-b">
            <h2 class="text-xl font-black text-blue-900 uppercase tracking-tight">Thêm thành viên mới</h2>
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold text-blue-900">Chào Thầy Thành</span>
                <img src="logo.png" class="w-10 h-10 rounded-full border border-blue-900 bg-white p-0.5">
            </div>
        </header>

        <div class="p-8 overflow-y-auto bg-gray-50 flex-1">
            <div class="max-w-3xl mx-auto bg-white rounded-[30px] p-8 shadow-sm border border-gray-100">
                <form id="add-user-form" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-[2px] ml-2">Họ và tên</label>
                        <input type="text" id="fullname" required placeholder="Nhập tên..." 
                               class="w-full mt-1 p-4 rounded-2xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition-all font-bold">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-[2px] ml-2">Email</label>
                        <input type="email" id="email" required placeholder="email@gmail.com" 
                               class="w-full mt-1 p-4 rounded-2xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-[2px] ml-2 font-bold text-red-600">Số điện thoại (sdt)</label>
                        <input type="text" id="sdt" required placeholder="09xxxxxxx" 
                               class="w-full mt-1 p-4 rounded-2xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition-all font-bold">
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-[2px] ml-2 font-bold text-blue-600">Link Facebook (link_fb)</label>
                        <input type="url" id="link_fb" placeholder="https://facebook.com/..." 
                               class="w-full mt-1 p-4 rounded-2xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-[2px] ml-2">Mật khẩu</label>
                        <input type="password" id="password" required placeholder="••••••••" 
                               class="w-full mt-1 p-4 rounded-2xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition-all font-bold">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-blue-900 uppercase tracking-[2px] ml-2">Vai trò</label>
                        <select id="role" class="w-full mt-1 p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none font-bold text-blue-900">
                            <option value="student">Học sinh</option>
                            <option value="admin">Quản trị viên</option>
                            <option value="teacher">Giáo viên</option>
                        </select>
                    </div>

                    <div class="md:col-span-2 flex gap-3 mt-6">
                        <button type="submit" id="btn-save" class="flex-1 bg-blue-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-800 transition-all shadow-lg shadow-blue-900/20">
                            Lưu tài khoản
                        </button>
                        <a href="user-list.html" class="px-8 bg-gray-100 text-gray-500 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-gray-200 transition-all flex items-center justify-center text-center">
                            Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rznyagxrshwwocsvrabe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nIlU5_ViUwLqJr91B-bGDg_hFgRPuW5';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('add-user-form');
        const btnSave = document.getElementById('btn-save');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSave.disabled = true;
            btnSave.innerHTML = `Đang lưu...`;

            const newUser = {
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                sdt: document.getElementById('sdt').value, // Đúng cột sdt của Thầy
                link_fb: document.getElementById('link_fb').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                status: 'active'
            };

            const { error } = await supabaseClient.from('accounts').insert([newUser]);

            if (error) {
                alert('Lỗi: ' + error.message);
                btnSave.disabled = false;
                btnSave.innerHTML = `Lưu tài khoản`;
            } else {
                alert('Thầy đã thêm thành viên thành công!');
                window.location.href = 'user-list.html';
            }
        });

        function toggleSubmenu(id, element) {
            const menu = document.getElementById(id);
            const arrow = element.querySelector('.arrow-icon');
            menu.classList.toggle('show');
            if (arrow) arrow.classList.toggle('rotate-180');
        }
    </script>
</body>
</html>
